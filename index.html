<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Version Stable</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; user-select: none; -webkit-user-select: none; touch-action: none; }
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.3; z-index: 1; transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            will-change: opacity, font-size;
            text-shadow: 0 0 5px black;
        }

        /* UI Elements */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; pointer-events: none; }
        .interactive { pointer-events: auto; }

        #settingsBtn {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255,255,255,0.2); border: 1px solid white;
            color: white; width: 40px; height: 40px; border-radius: 50%;
            font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        #settingsPanel {
            position: absolute; top: 65px; left: 15px;
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px;
            width: 280px; border: 1px solid #444;
            display: none;
        }
        
        .control-group { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: #ccc; }
        input[type=range] { width: 100%; accent-color: #00d2ff; }
        
        button.btn {
            background: #333; border: 1px solid #555; color: white; padding: 10px; 
            border-radius: 6px; width: 100%; cursor: pointer; margin-top: 5px; font-size: 13px;
        }
        button.btn-primary { background: #00d2ff; color: #000; border: none; font-weight: bold; }
        button.btn-test { background: #ff4444; color: white; border: none; font-weight: bold; }

        #calibContainer { 
            display: none; margin-top: 10px; padding: 10px; background: #111; border-radius: 8px; border: 1px dashed #444; 
        }
        .calib-bar { height: 20px; background: #ff4444; width: 50px; margin: 10px auto; border: 1px solid white; }

        #statsBar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; font-size: 12px; color: #aaa; 
            background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px;
        }
        .stat-val { color: #00d2ff; font-weight: bold; }

        #testBtnContainer {
            position: absolute; bottom: 20px; right: 20px;
        }

        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
</head>
<body>

    <div id="startOverlay">
        <h2 style="color:white; margin-bottom:20px;">TEST ACUITÉ VISUELLE</h2>
        <p style="color:#aaa; margin-bottom:30px; text-align:center; max-width: 300px;">
            1. Calibrez avec une règle.<br>
            2. Utilisez le bouton TEST pour vérifier la taille.
        </p>
        <button class="btn btn-primary" style="width:auto; padding:15px 40px; font-size:18px;" onclick="startApp()">COMMENCER</button>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay">E</div>

    <div id="ui-layer">
        <div id="settingsBtn" class="interactive" onclick="toggleSettings()">⚙️</div>

        <div id="settingsPanel" class="interactive">
            <div style="font-weight:bold; color:#00d2ff; margin-bottom:15px;">RÉGLAGES</div>

            <div class="control-group">
                <div class="label-row"><span>Acuité (1/10)</span> <span id="acuityVal" class="stat-val">1.0</span></div>
                <input type="range" id="acuityRange" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateAcuity()">
            </div>

            <button class="btn" onclick="toggleCalib()">📏 Calibrer (Règle 1cm)</button>
            
            <div id="calibContainer">
                <p style="font-size:11px; color:#aaa; text-align:center; margin:0 0 5px 0;">
                    Ajustez la barre rouge à <b>1 CM</b> avec une règle.
                </p>
                <div class="calib-bar" id="calibBar"></div>
                <input type="range" id="calibRange" min="20" max="150" step="1" value="50" oninput="updateCalibPreview()">
                <button class="btn btn-primary" onclick="saveCalib()">VALIDER</button>
            </div>
        </div>

        <div id="statsBar">
            <div>Dist: <span id="dispDist" class="stat-val">--</span> cm</div>
            <div>Taille: <span id="dispSizeMm" class="stat-val">--</span> mm</div>
        </div>

        <div id="testBtnContainer" class="interactive">
            <button class="btn btn-test" style="padding: 10px 20px; border-radius: 20px;" onclick="manualTest()">TEST LETTER</button>
        </div>
    </div>

    <script>
        let model, video, letterEl;
        let acuity = 1.0;
        let distance = 50;
        let pixelsPerCm = 56; // Défaut
        let letters = ["H", "X", "O", "V", "U", "Z", "C", "E", "N", "R"];

        function startApp() {
            loadCalib();
            document.getElementById('startOverlay').style.display = 'none';
            initCamera();
        }

        function initCamera() {
            video = document.getElementById('video');
            letterEl = document.getElementById('letterDisplay');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } })
            .then(stream => {
                video.srcObject = stream;
                return video.play();
            })
            .then(() => blazeface.load())
            .then(loadedModel => {
                model = loadedModel;
                requestAnimationFrame(processFrame);
            })
            .catch(err => alert("Erreur caméra: " + err));
        }

        // --- CALIBRAGE ---
        function toggleCalib() {
            const c = document.getElementById('calibContainer');
            c.style.display = (c.style.display === 'block') ? 'none' : 'block';
        }
        function updateCalibPreview() {
            pixelsPerCm = parseInt(document.getElementById('calibRange').value);
            document.getElementById('calibBar').style.width = pixelsPerCm + 'px';
            updateStats(); // Met à jour la taille estimée en temps réel
        }
        function saveCalib() {
            localStorage.setItem('avd_ppc', pixelsPerCm);
            toggleCalib();
            toggleSettings();
        }
        function loadCalib() {
            const saved = localStorage.getItem('avd_ppc');
            if (saved) {
                pixelsPerCm = parseInt(saved);
                document.getElementById('calibRange').value = pixelsPerCm;
                document.getElementById('calibBar').style.width = pixelsPerCm + 'px';
            }
        }

        // --- UI ---
        function toggleSettings() {
            const p = document.getElementById('settingsPanel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }
        function updateAcuity() {
            acuity = parseFloat(document.getElementById('acuityRange').value);
            document.getElementById('acuityVal').innerText = acuity.toFixed(1);
            updateStats();
        }

        // --- CALCUL TAILLE ---
        function getLetterSizePx(distCm) {
            // Formule : Taille(cm) = Distance(cm) * tan(5') / Acuité
            // tan(5') ≈ 0.0014544
            const sizeCm = (distCm * 0.0014544) / acuity;
            const sizePx = sizeCm * pixelsPerCm;
            return { px: Math.round(sizePx), mm: (sizeCm * 10).toFixed(1) };
        }

        function updateStats() {
            const data = getLetterSizePx(distance);
            document.getElementById('dispSizeMm').innerText = data.mm;
        }

        function showLetter() {
            const data = getLetterSizePx(distance);
            const letter = letters[Math.floor(Math.random() * letters.length)];
            
            letterEl.innerText = letter;
            letterEl.style.fontSize = data.px + 'px';
            letterEl.style.opacity = '1';
            
            // Feedback console pour debug
            console.log(`Affichage: ${letter}, Taille: ${data.px}px (${data.mm}mm) à ${distance}cm`);

            setTimeout(() => {
                letterEl.style.opacity = '0';
            }, 80);
        }

        function manualTest() {
            showLetter();
        }

        // --- BOUCLE VIDEO ---
        async function processFrame() {
            if (!model) return;

            const predictions = await model.estimateFaces(video, false);
            
            if (predictions.length > 0) {
                const face = predictions[0];
                const landmarks = face.landmarks;
                
                // Calcul Distance
                const leftEye = landmarks[0]; 
                const rightEye = landmarks[1];
                const distPx = Math.hypot(rightEye[0] - leftEye[0], rightEye[1] - leftEye[1]);
                
                // Sécurité division par zéro
                if (distPx > 0) {
                    distance = (6.3 / distPx) * window.innerWidth; // Approximation
                    // Limite raisonnable
                    if (distance > 200) distance = 200;
                    if (distance < 20) distance = 20;
                    
                    document.getElementById('dispDist').innerText = Math.round(distance);
                    updateStats();
                }
            }
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
