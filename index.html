<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Calibration MM CSS</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.15; z-index: 1; transform: scaleX(-1);
        }

        #letterContainer {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }

        #letter {
            color: white; font-weight: bold; opacity: 0;
            font-family: sans-serif; line-height: 1;
        }

        /* Calibration en CSS natif */
        #calibContainer {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%);
            display: none; z-index: 20; text-align: center;
        }
        #calibBar {
            height: 30px;
            background: rgba(255, 0, 0, 0.6);
            border: 1px solid white;
            /* C'est ici la magie : on demande 10mm au navigateur */
            width: 10mm; 
            margin: 0 auto;
        }
        #calibText {
            font-size: 12px; color: #ff5555; margin-top: 5px;
            background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px;
        }

        #controls {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); width: 90%;
            background: rgba(0, 0, 0, 0.85); padding: 15px;
            border-radius: 12px; z-index: 20; text-align: center;
            backdrop-filter: blur(5px); border: 1px solid #333;
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #ccc; }
        input[type=range] { width: 100%; accent-color: #4CAF50; }
        
        #startBtn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 20px;
            background: #4CAF50; color: white; border: none;
            border-radius: 8px; cursor: pointer; z-index: 30;
        }

        #log {
            position: absolute; top: 10px; left: 10px;
            font-size: 10px; color: lime; z-index: 5; pointer-events: none;
        }
        .info-text { font-size: 11px; color: #888; margin-top: 2px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@latest/dist/blazeface.min.js"></script>
</head>
<body>

    <video id="video" playsinline autoplay muted></video>
    <div id="log">Prêt</div>

    <!-- Calibration -->
    <div id="calibContainer">
        <div id="calibBar"></div>
        <div id="calibText">Cette barre doit faire 1 cm (10 mm)</div>
    </div>

    <div id="letterContainer">
        <div id="letter">E</div>
    </div>

    <button id="startBtn">ACTIVER LA CAMÉRA</button>

    <div id="controls" style="display:none;">
        <div class="control-group">
            <label>Acuité (Decimal): <strong id="valAcuity">1.0</strong></label>
            <input type="range" id="acuity" min="0.1" max="2.0" value="1.0" step="0.1">
            <div class="info-text" id="sizeInfo">Taille: -- mm</div>
        </div>

        <div class="control-group">
            <label>Distance: <strong id="valDist">--</strong> cm</label>
        </div>

        <div class="control-group">
            <button id="toggleCalib" style="background:#333; color:white; border:1px solid #555; padding:5px 10px; border-radius:4px;">Afficher Règle 1cm</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const letterEl = document.getElementById('letter');
        const startBtn = document.getElementById('startBtn');
        const controls = document.getElementById('controls');
        const logEl = document.getElementById('log');
        const calibContainer = document.getElementById('calibContainer');
        const toggleCalibBtn = document.getElementById('toggleCalib');

        let model = null;
        let isRunning = false;
        
        let acuity = 1.0;
        let displayDuration = 60; // ms
        let lastDisplayTime = 0;
        let lastHeadPos = { x: 0, y: 0 };
        let lastTime = 0;
        let distanceCm = 50;
        
        const letters = ['C', 'D', 'E', 'F', 'L', 'O', 'P', 'T', 'Z'];

        // Écouteurs
        document.getElementById('acuity').addEventListener('input', (e) => {
            acuity = parseFloat(e.target.value);
            document.getElementById('valAcuity').innerText = acuity.toFixed(1);
            updateSizeInfo();
        });

        toggleCalibBtn.addEventListener('click', () => {
            if(calibContainer.style.display === 'block') {
                calibContainer.style.display = 'none';
                toggleCalibBtn.innerText = "Afficher Règle 1cm";
            } else {
                calibContainer.style.display = 'block';
                toggleCalibBtn.innerText = "Masquer la Règle";
            }
        });

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            logEl.innerText = "Chargement IA...";
            
            try {
                model = await blazeface.load();
                logEl.innerText = "Caméra...";
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                video.play();
                
                controls.style.display = 'block';
                isRunning = true;
                logEl.innerText = "Système actif.";
                updateSizeInfo();
                requestAnimationFrame(processFrame);
                
            } catch (err) {
                alert("Erreur caméra: " + err.message);
                startBtn.style.display = 'block';
            }
        });

        function updateSizeInfo() {
            const dist = distanceCm > 0 ? distanceCm : 50;
            // Formule standard : Taille = (Dist * tan(5/60)) / Acuité
            const heightCm = (dist * 0.01454) / acuity;
            document.getElementById('sizeInfo').innerText = `Lettre : ${heightCm.toFixed(2)} cm (à ${dist.toFixed(0)}cm)`;
        }

        function calculatePixelSize(distCm, acuityVal) {
            // On veut la taille en mm
            const heightMm = ((distCm * 0.01454) / acuityVal) * 10;
            
            // Conversion MM -> Pixels
            // On utilise la même logique que le CSS : on demande au navigateur combien de pixels font 1mm
            // On crée un élément temporaire pour mesurer
            const tempDiv = document.createElement('div');
            tempDiv.style.width = '1mm';
            tempDiv.style.position = 'absolute';
            document.body.appendChild(tempDiv);
            const pixelsPerMm = tempDiv.offsetWidth;
            tempDiv.remove();
            
            return heightMm * pixelsPerMm;
        }

        async function processFrame() {
            if (!isRunning) return;

            const predictions = await model.estimateFaces(video, false);

            if (predictions.length > 0) {
                const face = predictions[0];
                const eyeLeft = face.landmarks[0];
                const eyeRight = face.landmarks[1];
                
                // 1. Distance
                const boxWidth = face.boundingBox.width;
                const videoWidth = video.videoWidth;
                // Estimation FOV 60°
                const fovRad = 60 * (Math.PI / 180);
                const angleSubtended = fovRad * (boxWidth / videoWidth);
                const faceWidthCm = 14.0; 
                let dist = faceWidthCm / (2 * Math.tan(angleSubtended / 2));
                
                // Lissage
                distanceCm = (distanceCm * 0.8) + (dist * 0.2);
                document.getElementById('valDist').innerText = distanceCm.toFixed(0);
                updateSizeInfo();

                // 2. Mouvement
                const now = performance.now();
                const currentPos = { x: eyeLeft[0], y: eyeLeft[1] };
                
                if (lastTime > 0) {
                    const dt = now - lastTime;
                    const dx = currentPos.x - lastHeadPos.x;
                    const dy = currentPos.y - lastHeadPos.y;
                    const distMoved = Math.sqrt(dx*dx + dy*dy);
                    const speed = distMoved / (dt / 1000);
                    
                    // Seuil adaptatif : plus on est loin, plus le mouvement en pixels est petit pour un même angle
                    // On garde un seuil fixe en pixels/sec pour l'instant, environ 1500px/sec
                    if (speed > 1500 && (now - lastDisplayTime) > 800) {
                        showLetter();
                        lastDisplayTime = now;
                    }
                }
                
                lastHeadPos = currentPos;
                lastTime = now;
            }

            requestAnimationFrame(processFrame);
        }

        function showLetter() {
            const randomLetter = letters[Math.floor(Math.random() * letters.length)];
            letterEl.innerText = randomLetter;
            
            const sizePx = calculatePixelSize(distanceCm, acuity);
            letterEl.style.fontSize = sizePx + 'px';
            letterEl.style.opacity = 1;
            
            setTimeout(() => { letterEl.style.opacity = 0; }, displayDuration);
        }
    </script>
</body>
</html>
