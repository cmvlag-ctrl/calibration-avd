<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection + Adaptatif</title>
    <style>
        /* ... (tous les styles précédents restent identiques) ... */
        /* J'ai gardé exactement les mêmes styles que dans la première version */
    </style>
</head>
<body>
    <!-- ... (tous les éléments HTML restent identiques) ... -->

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>

    <script>
        // ... (toutes les variables initiales restent identiques) ...

        // **NOUVEAU**: Paramètres pour la détection de mouvement
        const detectionConfig = {
            minSpeedTrigger: 150,    // Seuil de vitesse pour déclencher l'affichage
            flashDuration: 60,       // Durée d'affichage de la lettre (ms)
            cooldownDuration: 1000   // Temps minimum entre deux affichages
        };

        // ... (toutes les fonctions initiales restent identiques sauf handleState) ...

        // --- MACHINE D'ÉTAT CORRIGÉE ---
        function handleState(currentSpeed, now) {
            // **Seulement si on est en mode IDLE et que le test adaptatif n'a pas commencé**
            if (state === 'IDLE' && adaptiveStats.totalTrials === 0) {
                if (currentSpeed > detectionConfig.minSpeedTrigger &&
                    (now - lastFlashTime > detectionConfig.cooldownDuration)) {

                    state = 'WAITING_VALIDATION';
                    lastFlashTime = now;

                    currentDisplayedLetter = letters[Math.floor(Math.random() * letters.length)];
                    letterEl.innerText = currentDisplayedLetter;
                    letterEl.style.fontSize = letterSizePx + 'px';
                    letterEl.style.opacity = '1';

                    waitingMessage.style.display = 'block';

                    // Disparaît automatiquement après la durée configurée
                    flashTimeout = setTimeout(() => {
                        if (state === 'WAITING_VALIDATION') {
                            letterEl.style.opacity = '0';
                            // On reste en WAITING_VALIDATION jusqu'à validation
                        }
                    }, detectionConfig.flashDuration);
                }
            }
            // Dans l'état WAITING_VALIDATION, on ignore les mouvements de tête
        }

        // --- BOUCLE PRINCIPALE CORRIGÉE ---
        async function loop() {
            if (!model || state === 'TEST_COMPLETED') return;

            const predictions = await model.estimateFaces(video, false);

            if (predictions.length > 0) {
                const face = predictions[0];
                const nose = face.landmarks[2];
                const leftEye = face.landmarks[0];
                const rightEye = face.landmarks[1];

                // 1. DISTANCE (inchangé)
                const distInterYeuxPx = Math.sqrt(
                    Math.pow(rightEye[0] - leftEye[0], 2) +
                    Math.pow(rightEye[1] - leftEye[1], 2)
                );
                const K_FACTOR = 2800;
                if (distInterYeuxPx > 5) {
                    let calculatedDist = K_FACTOR / distInterYeuxPx;
                    rawDistance = calculatedDist;
                    distance = (distance * 0.9) + (rawDistance * 0.1);
                    distance = Math.max(30, Math.min(120, distance));
                }

                // 2. VITESSE (inchangé)
                const now = performance.now();
                if (lastHeadPos) {
                    const dt = (now - lastTime);
                    if (dt > 16) {
                        const dx = nose[0] - lastHeadPos.x;
                        const dy = nose[1] - lastHeadPos.y;
                        const distPx = Math.sqrt(dx*dx + dy*dy);
                        let rawSpeed = distPx / dt;
                        smoothedSpeed = (smoothedSpeed * 0.7) + (rawSpeed * 0.3);
                        speed = smoothedSpeed * 1000;
                    }
                }
                lastHeadPos = { x: nose[0], y: nose[1] };
                lastTime = now;

                // **Appel à handleState pour la détection de mouvement**
                handleState(speed, now);
                updateStats();
            } else {
                smoothedSpeed = smoothedSpeed * 0.9;
                speed = smoothedSpeed * 1000;
                updateStats();
            }

            // **Déclenchement initial du test adaptatif après 2 secondes**
            if (state === 'IDLE' && adaptiveStats.totalTrials === 0 && !modelLoading) {
                setTimeout(() => {
                    showNextLetter();
                }, 2000);
            }

            requestAnimationFrame(loop);
        }

        // ... (toutes les autres fonctions restent identiques) ...

        // --- DÉMARRAGE AVEC SUIVI DE CHARGEMENT ---
        let modelLoading = false;
        async function startApp() {
            modelLoading = true;
            adaptiveStats = {
                totalTrials: 0,
                correctAnswers: 0,
                errorsInRow: 0,
                minSizeReached: 200
            };

            loadCalib();
            initKeyboard();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    overlay.style.display = 'none';
                    ui.style.display = 'block';
                    letterSizeControl.style.display = 'block';
                    keyboard.style.display = 'flex';
                    video.play();
                    document.getElementById('statusInit').innerText = "Chargement IA...";

                    modelLoading = true;
                    model = await blazeface.load();
                    modelLoading = false;

                    document.getElementById('statusInit').innerText = "Prêt !";

                    const dpr = window.devicePixelRatio || 1;
                    let baseDPI = dpr > 2 ? 450 : (dpr > 1 ? 300 : 150);
                    screenDPI = baseDPI * calibrationFactor;

                    updateLetterDisplay();
                    updateAdaptiveStats();
                    loop();
                };
            } catch (err) {
                document.getElementById('errorMsg').innerText = "Erreur Caméra : " + err.message;
                modelLoading = false;
            }
        }
    </script>
</body>
</html>
