<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Calibration Réelle</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; user-select: none; -webkit-user-select: none; }
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.2; z-index: 1; transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif; /* Police standard pour optotypes */
            font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            /* Optimisation pour éviter le flou de sous-pixel */
            will-change: opacity, font-size;
            text-rendering: optimizeLegibility;
        }

        /* BOUTON RÉGLAGES */
        #toggleSettings {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; width: 40px; height: 40px; border-radius: 50%;
            font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); transition: all 0.2s;
        }
        #toggleSettings:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }

        /* PANNEAU RÉGLAGES */
        #settingsPanel {
            position: absolute; top: 65px; left: 15px; z-index: 99;
            background: rgba(0,0,0,0.95); padding: 20px; border-radius: 12px;
            width: 300px; border: 1px solid #444;
            transform: translateX(-150%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #settingsPanel.open { transform: translateX(0); }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .header-title { font-weight: bold; color: #00d2ff; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #bbb; }
        .stat-val { color: #fff; font-weight: 600; font-family: monospace; }
        
        .control-group { margin-top: 15px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 5px; }
        .slider-val { color: #00d2ff; font-weight: bold; }
        
        input[type=range] { width: 100%; margin: 0; accent-color: #00d2ff; }
        
        button.action-btn {
            background: #222; border: 1px solid #444; color: white; padding: 8px; 
            border-radius: 6px; width: 100%; cursor: pointer; margin-top: 10px; font-size: 12px;
        }
        button.action-btn:active { background: #444; }

        /* CALIBRATION SPÉCIALE */
        #calibArea { display: none; margin-top: 15px; text-align: center; background: #111; padding: 10px; border-radius: 8px; border: 1px dashed #444; }
        .calib-box { 
            width: 100%; height: 60px; margin: 10px 0; border: 1px solid #333; position: relative;
            display: flex; align-items: center; justify-content: center; background: #000;
        }
        /* La barre rouge sera ajustée en pixels via JS pour faire 1cm */
        .calib-bar { height: 40px; background: #ff4444; width: 50px; } 
        
        .gauge-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 60%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; z-index: 50;
        }
        .speed-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00ff88, #ffff00, #ff0055); transition: width 0.05s linear; }

        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .start-btn {
            padding: 15px 40px; background: #00d2ff; color: #000; border: none; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
</head>
<body>

    <div id="startOverlay">
        <h1 style="color:white; margin-bottom:20px;">TEST AVD</h1>
        <button class="start-btn" onclick="initCamera()">LANCER</button>
        <p style="color:#666; margin-top:10px; font-size:12px;">Autorisez la caméra</p>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay">E</div>

    <div id="toggleSettings" onclick="togglePanel()">⚙️</div>

    <div id="settingsPanel">
        <div class="header-row">
            <span class="header-title">Paramètres</span>
        </div>

        <div class="stat-row">
            <span>Vitesse</span>
            <span id="dispSpeed" class="stat-val" style="color:#0f0">0</span>
        </div>
        <div class="stat-row">
            <span>Distance</span>
            <span id="dispDist" class="stat-val">-- cm</span>
        </div>
        
        <div class="control-group">
            <div class="slider-label">
                <span>ACUITÉ (1/10)</span>
                <span id="acuityValDisplay" class="slider-val">1.0</span>
            </div>
            <input type="range" id="acuityRange" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateAcuity()">
        </div>

        <button class="action-btn" onclick="toggleCalib()">📏 CALIBRER (Règle requise)</button>
        
        <div id="calibArea">
            <div style="font-size:11px; color:#fff; margin-bottom:5px;">RÉGLEZ LA BARRE ROUGE À 1 CM EXACT</div>
            <div class="calib-box">
                <div class="calib-bar" id="calibBarRef"></div>
            </div>
            <input type="range" id="calibRange" min="10" max="200" step="1" value="50" oninput="updateCalibVal()">
            <button class="action-btn" style="background:#00d2ff; color:black; font-weight:bold;" onclick="saveCalib()">Valider la taille</button>
        </div>
    </div>

    <div class="gauge-container"><div class="speed-bar" id="speedBar"></div></div>

    <script>
        let model = null;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        
        // Variables
        let acuity = 1.0;
        let pixelsPerCm = 50; // Valeur par défaut (sera écrasée par calibrage)
        let distance = 50; 
        let speed = 0;
        let smoothedSpeed = 0;
        let state = 'IDLE';
        let lastFlashTime = 0;
        let lastPos = null;
        let lastTime = 0;
        const letters = "C D E F L N P T U V Z".split(" ");

        // --- UI HANDLERS ---

        function togglePanel() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        function toggleCalib() {
            const area = document.getElementById('calibArea');
            area.style.display = (area.style.display === 'block') ? 'none' : 'block';
        }

        function updateAcuity() {
            acuity = parseFloat(document.getElementById('acuityRange').value);
            document.getElementById('acuityValDisplay').innerText = acuity.toFixed(1);
        }

        // Le calibrage définit directement le nombre de pixels pour 1 centimètre
        function updateCalibVal() {
            let val = document.getElementById('calibRange').value;
            pixelsPerCm = parseInt(val);
            document.getElementById('calibBarRef').style.width = pixelsPerCm + 'px';
        }

        function saveCalib() {
            localStorage.setItem('avd_pixelsPerCm', pixelsPerCm);
            toggleCalib();
            alert("Calibrage enregistré ! La taille des lettres sera maintenant exacte.");
        }

        function loadCalib() {
            const saved = localStorage.getItem('avd_pixelsPerCm');
            if (saved) {
                pixelsPerCm = parseInt(saved);
                document.getElementById('calibRange').value = pixelsPerCm;
                document.getElementById('calibBarRef').style.width = pixelsPerCm + 'px';
            }
        }

        // --- CAMERA & AI ---

        async function initCamera() {
            loadCalib();
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    document.getElementById('startOverlay').style.display = 'none';
                    video.play();
                    model = await blazeface.load();
                    loop();
                };
            } catch (e) {
                alert("Erreur caméra: " + e.message);
            }
        }

        async function loop() {
            const predictions = await model.estimateFaces(video, false);
            
            if (predictions.length > 0) {
                const face = predictions[0];
                const nose = face.landmarks[2]; 
                const leftEye = face.landmarks[0];
                const rightEye = face.landmarks[1];

                // 1. Distance
                const eyeDistPx = Math.hypot(rightEye[0] - leftEye[0], rightEye[1] - leftEye[1]);
                if (eyeDistPx > 5) {
                    // 6.3cm est la moyenne interpupillaire adulte
                    // On utilise pixelsPerCm pour convertir en cm réels
                    let distCm = (6.3 / eyeDistPx) * pixelsPerCm; 
                    
                    // Lissage
                    if (distCm < 10) distCm = 10;
                    distance = (distance * 0.85) + (distCm * 0.15);
                }

                // 2. Vitesse
                const now = performance.now();
                if (lastPos) {
                    const dt = now - lastTime;
                    if (dt > 0) {
                        // Déplacement en pixels écran
                        const dx = nose[0] - lastPos.x;
                        const dy = nose[1] - lastPos.y;
                        let rawSpeed = Math.hypot(dx, dy) / dt; // px/ms
                        
                        // Conversion en degrés approx (simplifié pour trigger)
                        // On garde en px/frame pour la réactivité
                        smoothedSpeed = (smoothedSpeed * 0.7) + (rawSpeed * 0.3);
                        speed = smoothedSpeed * 100; // Valeur arbitraire pour affichage
                    }
                }
                lastPos = { x: nose[0], y: nose[1] };
                lastTime = now;

                checkTrigger(speed, now);
                updateUI();
            }

            requestAnimationFrame(loop);
        }

        function checkTrigger(currSpeed, now) {
            // Seuil de déclenchement
            if (state === 'IDLE' && currSpeed > 150 && (now - lastFlashTime > 800)) {
                state = 'FLASH';
                lastFlashTime = now;
                
                // CALCUL DE LA TAILLE
                // Formule: Taille(cm) = Distance(cm) * tan(5') / Acuité
                // tan(5 min d'arc) ≈ 0.001454
                const sizeCm = (distance * 0.001454) / acuity;
                
                // Conversion en pixels using NOTRE calibration
                const sizePx = sizeCm * pixelsPerCm;
                
                letterEl.innerText = letters[Math.floor(Math.random() * letters.length)];
                letterEl.style.fontSize = Math.round(sizePx) + 'px';
                letterEl.style.opacity = '1';

                setTimeout(() => {
                    letterEl.style.opacity = '0';
                    state = 'IDLE';
                }, 60);
            }
        }

        function updateUI() {
            document.getElementById('dispSpeed').innerText = Math.round(speed);
            document.getElementById('dispDist').innerText = Math.round(distance);
            document.getElementById('speedBar').style.width = Math.min(100, speed/2) + '%';
        }
    </script>
</body>
</html>
