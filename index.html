<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée avec Clavier</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.2; z-index: 1; transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px; font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            text-shadow: 0 0 10px black;
        }
        #ui {
            position: absolute; top: 10px; left: 10px; z-index: 20;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            max-width: 300px;
        }
        .stat { font-size: 12px; margin: 2px 0; color: #0f0; font-family: monospace; }
        .error { color: #f55; }

        .speed-gauge {
            height: 6px; background: #333; margin-top: 5px; border-radius: 3px; overflow: hidden;
        }
        .speed-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s linear;
        }

        button {
            background: #4ecdc4; border: none; padding: 10px; border-radius: 5px;
            cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px;
        }
        button.secondary { background: #555; color: white; }

        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }

        #calibPanel {
            display: none;
            margin-top: 10px; padding: 10px; border-radius: 6px;
            background: rgba(255,255,255,0.05); font-size: 11px;
        }
        #calibBarContainer {
            width: 100%; height: 8px; background: #222; border-radius: 4px;
            overflow: hidden; margin-top: 4px;
        }
        #calibBar {
            width: 100%; height: 100%; background: #4ecdc4;
            transform-origin: left center;
        }

        #keyboard {
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 10px;
        }
        .key {
            flex: 1 0 17%;
            padding: 8px;
            font-size: 14px;
            background: #333;
        }
        .key.validated { background: #2ecc71; }
        .key.invalid { background: #e74c3c; }

        #waitingMessage {
            margin-top: 8px;
            font-size: 12px;
            color: #ffd700;
            display: none;
        }

        #letterSizeControl {
            margin-top: 8px;
            display: none;
            font-size: 12px;
        }
        #letterSizeInput {
            width: 60px;
        }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    <div id="letterDisplay"></div>

    <div id="startOverlay">
        <h1>Test d'acuité visuelle</h1>
        <p>Placez-vous face à la caméra, puis appuyez sur Démarrer.</p>
        <button onclick="startApp()">Démarrer</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <div id="ui" style="display:none;">
        <div class="stat" id="statusInit">Initialisation...</div>
        <div class="stat" id="statusSpeed">Vitesse: 0</div>
        <div class="speed-gauge"><div class="speed-bar" id="speedBar"></div></div>
        <div class="stat" id="statusDist">Dist: ~0 cm</div>
        <div class="stat" id="statusSize">Taille: 0 px</div>

        <div style="margin-top:8px;font-size:12px;">
            Acuité (décimale):
            <input id="acuity" type="number" step="0.1" min="0.1" max="2.0" value="1.0" onchange="updateParams()" />
            <span id="valAcuity">1.0</span>
        </div>

        <div id="letterSizeControl">
            Taille lettre:
            <input id="letterSizeInput" type="number" min="20" max="300" value="80" onchange="updateLetterSizeFromInput()" />
            <span id="letterSizeValue">80</span> px
            <br>
            <button class="secondary" onclick="adjustLetterSize(-5)">-5 px</button>
            <button class="secondary" onclick="adjustLetterSize(5)">+5 px</button>
        </div>

        <button class="secondary" onclick="toggleCalib()">Calibrer distance / écran</button>
        <div id="calibPanel">
            <div>Calibration facteur: <span id="calibVal">1.0</span></div>
            <input id="calibSlider" type="range" min="0.5" max="2" step="0.01" value="1" oninput="updateCalib()" />
            <div id="calibBarContainer"><div id="calibBar"></div></div>
            <button class="secondary" onclick="saveCalib()">Sauvegarder</button>
        </div>

        <div id="waitingMessage">Une lettre vient d'apparaître. Cliquez sur la lettre correspondante ci‑dessous.</div>
        <div id="keyboard"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>

    <script>
        let model = null;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        let ui = document.getElementById('ui');
        let overlay = document.getElementById('startOverlay');
        let letterSizeControl = document.getElementById('letterSizeControl');
        let letterSizeValueEl = document.getElementById('letterSizeValue');
        let letterSizeInputEl = document.getElementById('letterSizeInput');
        let keyboard = document.getElementById('keyboard');
        let waitingMessage = document.getElementById('waitingMessage');

        let acuity = 1.0;
        let screenDPI = 300;
        let calibrationFactor = 1.0;
        let letterSizePx = 80;

        let lastHeadPos = null;
        let lastTime = 0;
        let speed = 0;
        let smoothedSpeed = 0;
        let distance = 50;
        let rawDistance = 50;
        let state = 'IDLE';
        let lastFlashTime = 0;
        let currentDisplayedLetter = null;
        let flashTimeout = null;

        const letters = "D F P V A N L C O E R U S Z H".split(" ");

        function initKeyboard() {
            keyboard.innerHTML = '';
            const lettersSorted = [...letters].sort();
            lettersSorted.forEach(letter => {
                const key = document.createElement('button');
                key.className = 'key';
                key.textContent = letter;
                key.onclick = () => validateLetter(letter);
                keyboard.appendChild(key);
            });
        }

        function validateLetter(letter) {
            if (state !== 'WAITING_VALIDATION') return;

            if (flashTimeout) {
                clearTimeout(flashTimeout);
                flashTimeout = null;
            }

            const keys = document.querySelectorAll('.key');
            keys.forEach(k => k.classList.remove('validated', 'invalid'));

            const clickedKey = Array.from(keys).find(k => k.textContent === letter);
            if (!clickedKey) return;

            if (letter === currentDisplayedLetter) {
                clickedKey.classList.add('validated');
                letterSizePx = Math.max(20, letterSizePx - 5);
            } else {
                clickedKey.classList.add('invalid');
                letterSizePx = Math.min(300, letterSizePx + 5);
            }

            letterSizeInputEl.value = letterSizePx;
            updateAcuityFromSize();
            updateLetterDisplay();

            letterEl.style.opacity = '0';
            currentDisplayedLetter = null;
            state = 'IDLE';
            waitingMessage.style.display = 'none';
            updateStats();
        }

        function toggleCalib() {
            const panel = document.getElementById('calibPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function updateCalib() {
            calibrationFactor = parseFloat(document.getElementById('calibSlider').value);
            document.getElementById('calibVal').innerText = calibrationFactor.toFixed(2);
            document.getElementById('calibBar').style.transform = `scaleX(${calibrationFactor})`;
        }

        function saveCalib() {
            localStorage.setItem('avd_blazeface_calib_v3', calibrationFactor);
            document.getElementById('calibPanel').style.display = 'none';
            const dpr = window.devicePixelRatio || 1;
            let baseDPI = dpr > 2 ? 450 : (dpr > 1 ? 300 : 150);
            screenDPI = baseDPI * calibrationFactor;
            updateStats();
        }

        function loadCalib() {
            const saved = localStorage.getItem('avd_blazeface_calib_v3');
            if (saved) {
                calibrationFactor = parseFloat(saved);
                document.getElementById('calibSlider').value = calibrationFactor;
                updateCalib();
            }
        }

        function updateLetterSizeFromInput() {
            const newSize = parseInt(letterSizeInputEl.value);
            if (!isNaN(newSize) && newSize >= 20 && newSize <= 300) {
                letterSizePx = newSize;
                updateAcuityFromSize();
                updateLetterDisplay();
                updateStats();
            }
            letterSizeInputEl.value = letterSizePx;
        }

        function adjustLetterSize(delta) {
            letterSizePx = Math.max(20, Math.min(300, letterSizePx + delta));
            letterSizeInputEl.value = letterSizePx;
            updateAcuityFromSize();
            updateLetterDisplay();
            updateStats();
        }

        function updateAcuityFromSize() {
            acuity = (distance * 0.0145 * screenDPI) / (2.54 * letterSizePx);
            acuity = Math.max(0.1, Math.min(2.0, acuity));
            document.getElementById('acuity').value = acuity.toFixed(1);
            document.getElementById('valAcuity').innerText = acuity.toFixed(1);
        }

        function updateLetterDisplay() {
            letterSizeValueEl.innerText = letterSizePx;
        }

        async function startApp() {
            loadCalib();
            initKeyboard();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    overlay.style.display = 'none';
                    ui.style.display = 'block';
                    letterSizeControl.style.display = 'block';
                    keyboard.style.display = 'flex';
                    video.play();
                    document.getElementById('statusInit').innerText = "Chargement IA...";
                    model = await blazeface.load();
                    document.getElementById('statusInit').innerText = "Prêt !";

                    const dpr = window.devicePixelRatio || 1;
                    let baseDPI = dpr > 2 ? 450 : (dpr > 1 ? 300 : 150);
                    screenDPI = baseDPI * calibrationFactor;

                    updateLetterDisplay();
                    loop();
                };
            } catch (err) {
                document.getElementById('errorMsg').innerText = "Erreur Caméra : " + err.message;
            }
        }

        async function loop() {
            if (!model) return;

            const predictions = await model.estimateFaces(video, false);

            if (predictions.length > 0) {
                const face = predictions;

                // BlazeFace:
                // landmarks = right eye, [1] = left eye, [2] = nose, [3] = mouth, [4] = right ear, [5] = left ear
                const rightEye = face.landmarks; // [x, y]
                const leftEye  = face.landmarks[1];
                const nose     = face.landmarks[2];

                // 1. Distance via distance inter‑yeux
                const dxEyes = rightEye - leftEye;
                const dyEyes = rightEye[1] - leftEye[1];
                const distInterYeuxPx = Math.sqrt(dxEyes * dxEyes + dyEyes * dyEyes);

                const K_FACTOR = 2800;
                if (distInterYeuxPx > 5) {
                    let calculatedDist = K_FACTOR / distInterYeuxPx;
                    rawDistance = calculatedDist;
                    distance = (distance * 0.9) + (rawDistance * 0.1);
                    distance = Math.max(30, Math.min(120, distance));
                }

                // 2. Vitesse du nez
                const now = performance.now();
                if (lastHeadPos) {
                    const dt = now - lastTime;
                    if (dt > 16) {
                        const dx = nose - lastHeadPos.x;
                        const dy = nose[1] - lastHeadPos.y;
                        const distPx = Math.sqrt(dx * dx + dy * dy);
                        const rawSpeed = distPx / dt;  // px/ms
                        smoothedSpeed = (smoothedSpeed * 0.7) + (rawSpeed * 0.3);
                        speed = smoothedSpeed * 1000;  // px/s
                    }
                }
                lastHeadPos = { x: nose, y: nose[1] };
                lastTime = now;

                handleState(speed, now);
                updateStats();
            } else {
                smoothedSpeed *= 0.9;
                speed = smoothedSpeed * 1000;
                updateStats();
            }

            requestAnimationFrame(loop);
        }

        function handleState(currentSpeed, now) {
            const minSpeedTrigger = 150;
            const flashDuration = 60;
            const cooldownDuration = 1000;

            if (state === 'IDLE') {
                if (currentSpeed > minSpeedTrigger && (now - lastFlashTime > cooldownDuration)) {
                    state = 'WAITING_VALIDATION';
                    lastFlashTime = now;

                    currentDisplayedLetter = letters[Math.floor(Math.random() * letters.length)];
                    letterEl.innerText = currentDisplayedLetter;
                    letterEl.style.fontSize = letterSizePx + 'px';
                    letterEl.style.opacity = '1';

                    waitingMessage.style.display = 'block';

                    flashTimeout = setTimeout(() => {
                        if (state === 'WAITING_VALIDATION') {
                            letterEl.style.opacity = '0';
                        }
                    }, flashDuration);
                }
            }
        }

        function calculateSize(distCm, acuityDecimal) {
            let heightCm = (distCm * 0.0145) / acuityDecimal;
            let heightPx = (heightCm / 2.54) * screenDPI;
            return Math.max(20, Math.round(heightPx));
        }

        function updateParams() {
            acuity = parseFloat(document.getElementById('acuity').value);
            document.getElementById('valAcuity').innerText = acuity.toFixed(1);
            letterSizePx = Math.round(calculateSize(distance, acuity));
            updateLetterDisplay();
            letterSizeInputEl.value = letterSizePx;
        }

        function updateStats() {
            document.getElementById('statusSpeed').innerText = `Vitesse: ${Math.round(speed)}`;
            document.getElementById('statusDist').innerText = `Dist: ~${Math.round(distance)} cm`;
            document.getElementById('statusSize').innerText = `Taille: ${letterSizePx} px`;

            let pct = Math.min(100, (speed / 250) * 100);
            document.getElementById('speedBar').style.width = `${pct}%`;

            const bar = document.getElementById('speedBar');
            if (speed > 150) bar.style.background = '#f00';
            else bar.style.background = 'linear-gradient(90deg, #0f0, #ff0, #f00)';
        }
    </script>
</body>
</html>
