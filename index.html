<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Calibration Corrigée</title>
    <style>
        body { 
            margin: 0; 
            background: #111; 
            overflow: hidden; 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
            color: white; 
            touch-action: none; 
            height: 100vh;
            width: 100vw;
        }
        
        /* Vidéo en arrière-plan */
        video {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            object-fit: cover; 
            opacity: 0.2; 
            z-index: 1; 
            transform: scaleX(-1); 
        }

        /* Conteneur de la lettre (CORRECTION ICI : ajout du point-virgule) */
        #letterContainer {
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); /* CORRIGÉ */
            z-index: 10;
            pointer-events: none;
        }

        #letter {
            color: white; 
            font-weight: bold; 
            opacity: 0;
            font-family: sans-serif; 
            line-height: 1;
            transition: opacity 0.05s;
        }

        /* Interface de Calibration */
        #uiContainer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 20;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid #333;
        }

        /* La zone de la barre de calibration */
        #calibArea {
            display: none; /* Caché par défaut */
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 10px;
        }

        #calibBarWrapper {
            /* Conteneur neutre */
            height: 20px;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        #calibBar {
            /* LARGEUR DE BASE : 10mm CSS */
            width: 10mm; 
            height: 100%;
            background-color: red;
            /* Le scale sera appliqué par JS */
            transform-origin: center; 
            border: 1px solid white;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin-bottom: 10px;
        }
        
        .btn-save {
            background: #28a745;
            margin-top: 10px;
        }

        input[type=range] {
            width: 100%;
            max-width: 300px;
            margin: 10px 0;
        }

        #debugInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 12px;
            color: lime;
            z-index: 30;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 4px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="video" playsinline autoplay muted></video>
    
    <div id="debugInfo">Chargement...</div>

    <div id="letterContainer">
        <div id="letter">E</div>
    </div>

    <!-- UI Calibration -->
    <div id="uiContainer">
        <button id="toggleCalibBtn" class="btn">📏 Calibrer l'écran (Règle 1cm)</button>
        
        <div id="calibArea">
            <p style="font-size: 14px; color: #ccc; margin: 0 0 10px 0;">
                Posez une règle physique sur l'écran.<br>
                Ajustez le curseur pour que la barre rouge fasse <b>exactement 1 cm</b>.
            </p>
            
            <div id="calibBarWrapper">
                <div id="calibBar"></div>
            </div>

            <input type="range" id="calibSlider" min="0.5" max="2.0" step="0.01" value="1.0">
            
            <button id="saveCalibBtn" class="btn btn-save">Valider ce réglage</button>
        </div>
    </div>

    <!-- Scripts MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // --- CONFIGURATION ---
        const letters = ['C', 'D', 'E', 'F', 'L', 'O', 'P', 'T', 'Z'];
        const acuityDecimal = 1.0; 
        const distanceCm = 40;     
        const displayDuration = 60; 
        
        // --- VARIABLES ---
        let calibrationFactor = 1.0;
        let lastDisplayTime = 0;
        let lastHeadPos = { x: 0, y: 0 };
        let lastTime = 0;
        const speedThreshold = 1500; 

        // Éléments DOM
        const video = document.getElementById('video');
        const letterEl = document.getElementById('letter');
        const debugEl = document.getElementById('debugInfo');
        const calibBar = document.getElementById('calibBar');
        const calibSlider = document.getElementById('calibSlider');
        const toggleCalibBtn = document.getElementById('toggleCalibBtn');
        const calibArea = document.getElementById('calibArea');
        const saveCalibBtn = document.getElementById('saveCalibBtn');

        // --- 1. INITIALISATION CALIBRATION ---
        function initCalibration() {
            // Charger la valeur sauvegardée ou défaut 1.0
            const saved = localStorage.getItem('avd_calib_factor');
            if (saved) {
                calibrationFactor = parseFloat(saved);
                calibSlider.value = calibrationFactor;
            }
            updateCalibVisual();
        }

        function updateCalibVisual() {
            // Applique le facteur d'échelle à la barre rouge
            // Si factor = 1.4, la barre de 10mm CSS grossit de 40%
            calibBar.style.transform = `scale(${calibrationFactor})`;
        }

        // --- 2. GESTION UI ---
        toggleCalibBtn.addEventListener('click', () => {
            const isVisible = calibArea.style.display === 'flex';
            if (isVisible) {
                calibArea.style.display = 'none';
                toggleCalibBtn.innerText = "📏 Calibrer l'écran (Règle 1cm)";
            } else {
                calibArea.style.display = 'flex';
                toggleCalibBtn.innerText = "Masquer Calibration";
            }
        });

        calibSlider.addEventListener('input', (e) => {
            calibrationFactor = parseFloat(e.target.value);
            updateCalibVisual();
        });

        saveCalibBtn.addEventListener('click', () => {
            localStorage.setItem('avd_calib_factor', calibrationFactor);
            alert(`Réglage sauvegardé (Facteur: ${calibrationFactor})`);
            calibArea.style.display = 'none';
            toggleCalibBtn.innerText = "📏 Calibrer l'écran (Règle 1cm)";
        });

        // --- 3. CALCUL TAILLE LETTRE ---
        function getLetterPixelSize() {
            // Formule simplifiée pour 10/10ème à 40cm ~ 1.16mm
            // Taille(mm) = Distance(cm) * 0.0291 / Acuité
            const sizeMm = (distanceCm * 0.0291) / acuityDecimal;
            
            // Astuce fiable pour convertir mm -> pixels sur n'importe quel écran
            const dummy = document.createElement('div');
            dummy.style.width = '1mm';
            dummy.style.height = '1mm'; // Hauteur aussi pour stabilité
            dummy.style.position = 'absolute';
            dummy.style.visibility = 'hidden';
            document.body.appendChild(dummy);
            const pxPerMm = dummy.getBoundingClientRect().width;
            document.body.removeChild(dummy);
            
            // Calcul final : Taille théorique * Pixels/mm * Correction Utilisateur
            const finalPx = sizeMm * pxPerMm * calibrationFactor;
            return finalPx;
        }

        function showLetter() {
            const char = letters[Math.floor(Math.random() * letters.length)];
            letterEl.innerText = char;
            letterEl.style.fontSize = `${getLetterPixelSize()}px`;
            letterEl.style.opacity = 1;
            
            setTimeout(() => {
                letterEl.style.opacity = 0;
            }, displayDuration);
        }

        // --- 4. SUIVI TÊTE (MediaPipe) ---
        function onResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                const nose = landmarks[1]; // Bout du nez
                
                const x = nose.x * window.innerWidth;
                const y = nose.y * window.innerHeight;
                const now = performance.now();

                // Calcul vitesse
                if (lastTime !== 0) {
                    const dt = now - lastTime;
                    if (dt > 0) {
                        const dx = x - lastHeadPos.x;
                        const dy = y - lastHeadPos.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        const speed = (dist / dt) * 1000; // px/sec

                        debugEl.innerText = `Vitesse: ${Math.round(speed)} px/s`;

                        if (speed > speedThreshold) {
                            if (now - lastDisplayTime > 800) { // Délai anti-rebond
                                showLetter();
                                lastDisplayTime = now;
                            }
                        }
                    }
                }
                lastHeadPos = { x, y };
                lastTime = now;
            } else {
                debugEl.innerText = "Visage non détecté";
            }
        }

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});
        
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        faceMesh.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => {
                await faceMesh.send({image: video});
            },
            width: 640,
            height: 480
        });
        
        // Démarrage
        initCalibration();
        camera.start()
            .then(() => debugEl.innerText = "Caméra active")
            .catch(err => debugEl.innerText = "Erreur caméra: " + err);

    </script>
</body>
</html>
