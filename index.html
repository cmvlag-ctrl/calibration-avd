<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée avec Clavier</title>
    <style>
        /* ... (votre CSS inchangé, conservez-le tel quel) ... */
    </style>
</head>
<body>
    <!-- ... (votre HTML inchangé, conservez-le tel quel) ... -->

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
    <script>
        // --- VARIABLES GLOBALES ---
        let model;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        let startOverlay = document.getElementById('startOverlay');
        let ui = document.getElementById('ui');
        let startMessage = document.getElementById('startMessage');
        let letterSizeControl = document.getElementById('letterSizeControl');
        let keyboard = document.getElementById('keyboard');
        let letterSizeInputEl = document.getElementById('letterSizeInput');
        let letterSizeValueEl = document.getElementById('letterSizeValue');
        let scoreTopPanel = document.getElementById('scoreTopPanel');

        // Statistiques
        let totalLetters = 0;
        let correctLetters = 0;
        let minSuccessfulLetterSize = Infinity;

        // Paramètres de calibration
        let calibrationFactor = 1.0;
        let screenDPI = window.devicePixelRatio * 96;

        // État du test
        let state = 'IDLE';
        let lastFlashTime = 0;
        let flashTimeout = null;
        let currentDisplayedLetter = '';

        // Paramètres de mouvement
        let distance = 60;
        let rawDistance = 60;
        let speed = 0;
        let smoothedSpeed = 0;
        let lastHeadPos = null;
        let lastTime = performance.now();

        // Statistiques par direction
        let movements = {
            right: { count: 0, correct: 0, minSize: Infinity },
            left: { count: 0, correct: 0, minSize: Infinity },
            up: { count: 0, correct: 0, minSize: Infinity },
            down: { count: 0, correct: 0, minSize: Infinity }
        };

        // Direction du dernier mouvement détecté (initialisé à null)
        let lastMovementDirection = null;

        // Liste des lettres
        const letters = "D F P V A N L C O E R U S Z H".split(" ");

        // --- INITIALISATION DU CLAVIER ---
        function initKeyboard() {
            keyboard.innerHTML = '';
            const lettersSorted = [...letters].sort();
            lettersSorted.forEach(letter => {
                const key = document.createElement('button');
                key.className = 'key';
                key.textContent = letter;
                key.onclick = () => validateLetter(letter);
                keyboard.appendChild(key);
            });
        }

        // --- VALIDATION D'UNE LETTRE (avec mise à jour des stats) ---
        function validateLetter(letter) {
            if (state !== 'WAITING_VALIDATION') return;

            if (flashTimeout) {
                clearTimeout(flashTimeout);
                flashTimeout = null;
            }

            const keys = document.querySelectorAll('.key');
            keys.forEach(k => k.classList.remove('validated', 'invalid'));

            const clickedKey = Array.from(keys).find(k => k.textContent === letter);
            if (!clickedKey) return;

            totalLetters++;
            const isCorrect = letter === currentDisplayedLetter;

            if (isCorrect) {
                correctLetters++;
                clickedKey.classList.add('validated');
                letterEl.style.opacity = '0';

                // Réduire la taille de la lettre
                letterSizePx = Math.max(5, letterSizePx - 5);
                if (letterSizePx < minSuccessfulLetterSize) {
                    minSuccessfulLetterSize = letterSizePx;
                }

                // Mettre à jour les stats de la dernière direction détectée
                if (lastMovementDirection && movements[lastMovementDirection]) {
                    movements[lastMovementDirection].correct++;
                    movements[lastMovementDirection].minSize = Math.min(
                        movements[lastMovementDirection].minSize,
                        letterSizePx
                    );
                }
            } else {
                clickedKey.classList.add('invalid');
                letterSizePx = Math.min(300, letterSizePx + 5);
            }

            updateScore();
            updateLetterDisplay();
            updateStats();
            state = 'IDLE';
        }

        // --- METTRE À JOUR LE SCORE ---
        function updateScore() {
            const score = totalLetters > 0 ? Math.round((correctLetters / totalLetters) * 100) : 0;
            scoreTopPanel.innerHTML = `Score: ${score}% | Min: ${minSuccessfulLetterSize !== Infinity ? minSuccessfulLetterSize + ' px' : '-- px'}`;
        }

        // --- METTRE À JOUR LES STATISTIQUES FINALES ---
        function showFinalStats() {
            document.getElementById('globalSuccessRate').textContent =
                totalLetters > 0 ? `${Math.round((correctLetters / totalLetters) * 100)}%` : '--%';

            // Droite
            document.getElementById('rightCount').textContent = movements.right.count;
            document.getElementById('rightSuccessRate').textContent =
                movements.right.count > 0 ? `${Math.round((movements.right.correct / movements.right.count) * 100)}%` : '--%';
            document.getElementById('rightMinSize').textContent =
                movements.right.minSize !== Infinity ? `${movements.right.minSize} px` : '-- px';

            // Gauche
            document.getElementById('leftCount').textContent = movements.left.count;
            document.getElementById('leftSuccessRate').textContent =
                movements.left.count > 0 ? `${Math.round((movements.left.correct / movements.left.count) * 100)}%` : '--%';
            document.getElementById('leftMinSize').textContent =
                movements.left.minSize !== Infinity ? `${movements.left.minSize} px` : '-- px';

            // Haut
            document.getElementById('upCount').textContent = movements.up.count;
            document.getElementById('upSuccessRate').textContent =
                movements.up.count > 0 ? `${Math.round((movements.up.correct / movements.up.count) * 100)}%` : '--%';
            document.getElementById('upMinSize').textContent =
                movements.up.minSize !== Infinity ? `${movements.up.minSize} px` : '-- px';

            // Bas
            document.getElementById('downCount').textContent = movements.down.count;
            document.getElementById('downSuccessRate').textContent =
                movements.down.count > 0 ? `${Math.round((movements.down.correct / movements.down.count) * 100)}%` : '--%';
            document.getElementById('downMinSize').textContent =
                movements.down.minSize !== Infinity ? `${movements.down.minSize} px` : '-- px';

            finalStatsOverlay.style.display = 'flex';
        }

        // --- RECOMMENCER LE TEST ---
        function restartTest() {
            totalLetters = 0;
            correctLetters = 0;
            minSuccessfulLetterSize = Infinity;
            movements = {
                right: { count: 0, correct: 0, minSize: Infinity },
                left: { count: 0, correct: 0, minSize: Infinity },
                up: { count: 0, correct: 0, minSize: Infinity },
                down: { count: 0, correct: 0, minSize: Infinity }
            };
            lastMovementDirection = null;
            updateScore();
            scoreTopPanel.innerHTML = `Score: --% | Min: -- px`;
            finalStatsOverlay.style.display = 'none';
            letterSizePx = 80;
            updateLetterDisplay();
        }

        // --- CALIBRATION ---
        function toggleCalib() {
            document.getElementById('calibPanel').style.display =
                document.getElementById('calibPanel').style.display === 'none' ? 'block' : 'none';
        }
        function updateCalib() {
            calibrationFactor = parseFloat(document.getElementById('calibSlider').value);
            document.getElementById('calibBar').style.transform = `scaleX(${calibrationFactor})`;
        }
        function saveCalib() {
            localStorage.setItem('avd_blazeface_calib_v3', calibrationFactor);
            document.getElementById('calibPanel').style.display = 'none';
            updateStats();
        }
        function loadCalib() {
            const saved = localStorage.getItem('avd_blazeface_calib_v3');
            if (saved) {
                calibrationFactor = parseFloat(saved);
                document.getElementById('calibSlider').value = calibrationFactor;
                updateCalib();
            }
        }

        // --- GESTION DE LA TAILLE DES LETTRES ---
        function updateLetterSizeFromInput() {
            const newSize = parseInt(letterSizeInputEl.value);
            if (!isNaN(newSize) && newSize >= 5 && newSize <= 300) {
                letterSizePx = newSize;
                updateLetterDisplay();
                updateStats();
            }
            letterSizeInputEl.value = letterSizePx;
        }

        function adjustLetterSize(delta) {
            letterSizePx = Math.max(5, Math.min(300, letterSizePx + delta));
            letterSizeInputEl.value = letterSizePx;
            updateLetterDisplay();
            updateStats();
        }

        let letterSizePx = 80;

        function updateLetterDisplay() {
            letterSizeValueEl.innerText = letterSizePx;
            letterEl.style.fontSize = letterSizePx + 'px';
        }

        // --- DÉTECTION DE LA DIRECTION DU MOUVEMENT (optimisée) ---
        function detectDirection(currentPos, lastPos) {
            if (!lastPos) return;

            const dx = currentPos.x - lastPos.x;
            const dy = currentPos.y - lastPos.y;
            const threshold = 10;

            if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    // Mouvement horizontal dominant
                    lastMovementDirection = dx > 0 ? 'right' : 'left';
                } else {
                    // Mouvement vertical dominant
                    lastMovementDirection = dy > 0 ? 'down' : 'up';
                }
            }
        }

        // --- METTRE À JOUR LES COMPTEURS DE MOUVEMENTS ---
        function updateMovementCount(direction) {
            if (!movements[direction]) {
                movements[direction] = { count: 0, correct: 0, minSize: Infinity };
            }
            movements[direction].count++;
        }

        // --- METTRE À JOUR LE SCORE ET LA VITESSE ---
        function updateStats() {
            document.getElementById('statusSpeed').innerText = `Vitesse: ${Math.round(speed)}`;
            document.getElementById('statusDist').innerText = `Dist: ~${Math.round(distance)} cm`;
            document.getElementById('statusSize').innerText = `Taille: ${letterSizePx} px`;

            let pct = Math.min(100, (speed / 250) * 100);
            document.getElementById('speedBar').style.width = `${pct}%`;
            const bar = document.getElementById('speedBar');
            bar.style.background = speed > 150 ? '#f00' : 'linear-gradient(90deg, #0f0, #ff0, #f00)';
        }

        // --- MACHINE D'ÉTAT ---
        function handleState(currentSpeed, now) {
            const minSpeedTrigger = 150;
            const flashDuration = 60;
            const cooldownDuration = 1000;

            if (state === 'IDLE' && currentSpeed > minSpeedTrigger && (now - lastFlashTime > cooldownDuration)) {
                state = 'WAITING_VALIDATION';
                lastFlashTime = now;
                currentDisplayedLetter = letters[Math.floor(Math.random() * letters.length)];
                letterEl.innerText = currentDisplayedLetter;
                letterEl.style.opacity = '1';

                flashTimeout = setTimeout(() => {
                    if (state === 'WAITING_VALIDATION') {
                        letterEl.style.opacity = '0';
                    }
                }, flashDuration);
            }
        }

        // --- DÉMARRAGE ---
        async function startApp() {
            loadCalib();
            initKeyboard();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    startOverlay.style.display = 'none';
                    ui.style.display = 'block';
                    letterSizeControl.style.display = 'block';
                    keyboard.style.display = 'flex';
                    leftControls.style.display = 'block';
                    rightControls.style.display = 'block';
                    video.play();
                    document.getElementById('statusInit').innerText = "Chargement IA...";
                    model = await blazeface.load();
                    document.getElementById('statusInit').innerText = "IA prête";
                    startMessage.style.opacity = '1';
                    setTimeout(() => startMessage.style.opacity = '0', 1000);
                    updateLetterDisplay();
                    loop();
                };
            } catch (err) {
                document.getElementById('errorMsg').innerText = "Erreur Caméra : " + err.message;
            }
        }

        // --- BOUCLE PRINCIPALE ---
        async function loop() {
            if (!model) return;

            const predictions = await model.estimateFaces(video, false);
            if (predictions.length > 0) {
                const face = predictions[0];
                const nose = face.landmarks[2];
                const leftEye = face.landmarks[0];
                const rightEye = face.landmarks[1];

                // Calcul de la distance
                const distInterYeuxPx = Math.sqrt(
                    Math.pow(rightEye[0] - leftEye[0], 2) +
                    Math.pow(rightEye[1] - leftEye[1], 2)
                );
                const K_FACTOR = 2800;
                if (distInterYeuxPx > 5) {
                    let calculatedDist = K_FACTOR / distInterYeuxPx;
                    rawDistance = calculatedDist;
                    distance = (distance * 0.9) + (rawDistance * 0.1);
                    distance = Math.max(30, Math.min(120, distance));
                }

                // Calcul de la vitesse
                const now = performance.now();
                if (lastHeadPos) {
                    const dt = (now - lastTime);
                    if (dt > 16) {
                        const dx = nose[0] - lastHeadPos.x;
                        const dy = nose[1] - lastHeadPos.y;
                        const distPx = Math.sqrt(dx*dx + dy*dy);
                        let rawSpeed = distPx / dt;
                        smoothedSpeed = (smoothedSpeed * 0.7) + (rawSpeed * 0.3);
                        speed = smoothedSpeed * 1000;
                    }
                }
                lastHeadPos = { x: nose[0], y: nose[1] };
                lastTime = now;

                // Détection de la direction
                detectDirection(nose, lastHeadPos);

                // Si une direction a été détectée, mettre à jour le compteur
                if (lastMovementDirection) {
                    updateMovementCount(lastMovementDirection);
                }

                handleState(speed, now);
                updateStats();
            } else {
                smoothedSpeed = smoothedSpeed * 0.9;
                speed = smoothedSpeed * 1000;
                updateStats();
            }
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
