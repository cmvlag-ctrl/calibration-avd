<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Mode Concentration</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; user-select: none; -webkit-user-select: none; }
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.2; z-index: 1; transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px; font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            text-shadow: 0 0 10px black;
        }

        /* BOUTON RÉGLAGES */
        #toggleSettings {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; width: 40px; height: 40px; border-radius: 50%;
            font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); transition: all 0.2s;
        }
        #toggleSettings:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }

        /* PANNEAU RÉGLAGES (Caché par défaut) */
        #settingsPanel {
            position: absolute; top: 65px; left: 15px; z-index: 99;
            background: rgba(0,0,0,0.9); padding: 15px; border-radius: 12px;
            width: 260px; border: 1px solid #333;
            transform: translateX(-150%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            pointer-events: auto;
        }
        #settingsPanel.open { transform: translateX(0); }

        /* CONTENU DU PANNEAU */
        .stat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: #aaa; }
        .stat-val { color: #0f0; font-weight: bold; }
        
        .control-group { margin-top: 12px; border-top: 1px solid #333; padding-top: 10px; }
        input[type=range] { width: 100%; margin: 8px 0; accent-color: #00d2ff; }
        
        button.action-btn {
            background: #333; border: none; color: white; padding: 8px; 
            border-radius: 6px; width: 100%; cursor: pointer; margin-top: 5px; font-size: 12px;
        }
        button.action-btn:active { background: #555; }

        /* CALIBRATION */
        #calibArea { display: none; margin-top: 10px; text-align: center; background: #111; padding: 10px; border-radius: 8px; }
        .calib-box { 
            width: 100px; height: 40px; margin: 10px auto; border: 1px solid #444; 
            display: flex; align-items: center; justify-content: center; 
        }
        .calib-bar { height: 100%; background: #ff4444; width: 50px; }

        /* JAUGE DE VITESSE (TOUJOURS VISIBLE) */
        .gauge-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 70%; height: 8px; background: rgba(255,255,255,0.1); 
            border-radius: 4px; overflow: hidden; z-index: 50;
        }
        .speed-bar {
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, #00ff88, #ffff00, #ff0055);
            transition: width 0.1s linear;
        }

        /* OVERLAY START */
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        h1 { margin-bottom: 10px; font-weight: 300; letter-spacing: 1px; }
        .start-btn {
            padding: 15px 40px; background: #00d2ff; color: #000; 
            border: none; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
    <!-- TensorFlow.js & BlazeFace -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
</head>
<body>

    <!-- OVERLAY DÉMARRAGE -->
    <div id="startOverlay">
        <h1>TEST AVD</h1>
        <p style="color:#888; margin-bottom:30px; font-size:14px;">Entraînement Acuité Dynamique</p>
        <button class="start-btn" onclick="initCamera()">COMMENCER</button>
        <p id="errorLog" style="color:red; margin-top:20px; font-size:12px;"></p>
    </div>

    <!-- VIDEO & LETTRE -->
    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay">A</div>

    <!-- BOUTON RÉGLAGES -->
    <div id="toggleSettings" onclick="togglePanel()">⚙️</div>

    <!-- PANNEAU RÉGLAGES -->
    <div id="settingsPanel">
        <div class="stat-row">Vitesse: <span id="dispSpeed" class="stat-val">0</span></div>
        <div class="stat-row">Distance: <span id="dispDist" class="stat-val">--</span> cm</div>
        <div class="stat-row">Taille: <span id="dispSize" class="stat-val">--</span> px</div>

        <div class="control-group">
            <label style="font-size:12px; color:#fff;">Acuité Visuelle</label>
            <input type="range" id="acuityRange" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateAcuity()">
            
            <button class="action-btn" onclick="toggleCalib()">📏 Calibrer écran (1cm)</button>
            
            <div id="calibArea">
                <div style="font-size:10px; color:#aaa; margin-bottom:5px;">Ajustez pour faire 1cm réel</div>
                <div class="calib-box">
                    <div class="calib-bar" id="calibBarRef"></div>
                </div>
                <input type="range" id="calibRange" min="0.5" max="2.0" step="0.05" value="1.0" oninput="updateCalibVal()">
                <button class="action-btn" style="background:#00d2ff; color:black;" onclick="saveCalib()">Sauvegarder</button>
            </div>
        </div>
    </div>

    <!-- JAUGE -->
    <div class="gauge-container">
        <div class="speed-bar" id="speedBar"></div>
    </div>

    <script>
        let model = null;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        
        // Variables d'état
        let acuity = 1.0;
        let calibrationFactor = 1.0; 
        let screenDPI = 300;
        let isRunning = false;

        // Tracking
        let lastPos = null; 
        let lastTime = 0;
        let speed = 0;
        let smoothedSpeed = 0;
        let distance = 50;
        let state = 'IDLE';
        let lastFlashTime = 0;
        const letters = "C D F H L N O P T U V Z".split(" ");

        // --- GESTION UI ---
        
        // Correction du bug bouton : fonction globale explicite
        function togglePanel() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('open');
            console.log("Panel toggled"); // Debug
        }

        function toggleCalib() {
            const area = document.getElementById('calibArea');
            area.style.display = area.style.display === 'block' ? 'none' : 'block';
        }

        function updateAcuity() {
            acuity = parseFloat(document.getElementById('acuityRange').value);
            document.getElementById('dispSize').innerText = Math.round(calculateSize(distance, acuity));
        }

        function updateCalibVal() {
            calibrationFactor = parseFloat(document.getElementById('calibRange').value);
            // On simule l'affichage du 1cm
            document.getElementById('calibBarRef').style.width = (50 * calibrationFactor) + 'px';
        }

        function saveCalib() {
            localStorage.setItem('avd_calib_v5', calibrationFactor);
            toggleCalib(); // Ferme la zone calib
            alert("Calibrage sauvegardé !");
        }

        function loadCalib() {
            const saved = localStorage.getItem('avd_calib_v5');
            if (saved) {
                calibrationFactor = parseFloat(saved);
                document.getElementById('calibRange').value = calibrationFactor;
                updateCalibVal();
            }
        }

        // --- CAMERA & IA ---

        async function initCamera() {
            loadCalib();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    document.getElementById('startOverlay').style.display = 'none';
                    video.play();
                    model = await blazeface.load();
                    
                    // Calcul DPI approximatif
                    const dpr = window.devicePixelRatio || 1;
                    screenDPI = (dpr > 2 ? 450 : 300) * calibrationFactor;
                    
                    isRunning = true;
                    loop();
                };
            } catch (e) {
                document.getElementById('errorLog').innerText = "Accès caméra refusé ou erreur: " + e.message;
            }
        }

        async function loop() {
            if (!isRunning) return;

            // Détection
            const predictions = await model.estimateFaces(video, false);
            
            if (predictions.length > 0) {
                const face = predictions[0];
                const nose = face.landmarks[2]; 
                const leftEye = face.landmarks[0];
                const rightEye = face.landmarks[1];

                // 1. Calcul Distance
                const eyeDistPx = Math.hypot(rightEye[0] - leftEye[0], rightEye[1] - leftEye[1]);
                // Formule corrigée : K / pixels
                if (eyeDistPx > 5) {
                    let rawDist = 2800 / eyeDistPx; 
                    // Lissage distance
                    distance = (distance * 0.85) + (rawDist * 0.15);
                }

                // 2. Calcul Vitesse
                const now = performance.now();
                if (lastPos) {
                    const dt = now - lastTime;
                    if (dt > 16) { // ~60fps
                        const dx = nose[0] - lastPos.x;
                        const dy = nose[1] - lastPos.y;
                        // Vitesse en pixels/ms * facteur pour avoir une échelle lisible
                        let rawSpeed = Math.hypot(dx, dy) / dt;
                        
                        // Lissage vitesse (filtre passe-bas)
                        smoothedSpeed = (smoothedSpeed * 0.7) + (rawSpeed * 0.3);
                        
                        // Conversion en "unité arbitraire de vitesse" (x1000 pour lecture humaine)
                        speed = smoothedSpeed * 1000; 
                    }
                }
                lastPos = { x: nose[0], y: nose[1] };
                lastTime = now;

                handleTrigger(speed, now);
                updateUI();
            } else {
                // Perte de跟踪 : vitesse tombe à 0 doucement
                smoothedSpeed *= 0.9;
                speed = smoothedSpeed * 1000;
                updateUI();
            }

            requestAnimationFrame(loop);
        }

        // --- LOGIQUE JEU ---

        function handleTrigger(currentSpeed, now) {
            const THRESHOLD = 150; // Vitesse min
            const COOLDOWN = 900;  // Temps entre deux lettres

            if (state === 'IDLE') {
                if (currentSpeed > THRESHOLD && (now - lastFlashTime > COOLDOWN)) {
                    // Déclenchement !
                    state = 'FLASH';
                    lastFlashTime = now;
                    
                    // Affichage
                    const char = letters[Math.floor(Math.random() * letters.length)];
                    letterEl.innerText = char;
                    letterEl.style.fontSize = calculateSize(distance, acuity) + 'px';
                    letterEl.style.opacity = '1';

                    // Masquage après 60ms
                    setTimeout(() => {
                        letterEl.style.opacity = '0';
                        state = 'IDLE';
                    }, 60);
                }
            }
        }

        function calculateSize(distCm, dec) {
            // Taille d'un optotype (5 min d'arc)
            // h(cm) = dist(cm) * tan(5/60 deg) approx dist * 0.00145
            let hCm = distCm * 0.0145 / dec; 
            let hPx = (hCm / 2.54) * screenDPI;
            return Math.max(20, Math.round(hPx));
        }

        function updateUI() {
            // Mettre à jour les chiffres dans le panneau (seulement si ouvert pour perf ? Non, JS est rapide enough)
            document.getElementById('dispSpeed').innerText = Math.round(speed);
            document.getElementById('dispDist').innerText = Math.round(distance);
            document.getElementById('dispSize').innerText = calculateSize(distance, acuity);

            // Mettre à jour la barre colorée (TOUJOURS)
            // Max visuelle à 300 de vitesse
            let pct = Math.min(100, (speed / 300) * 100);
            document.getElementById('speedBar').style.width = pct + '%';
        }
    </script>
</body>
</html>
