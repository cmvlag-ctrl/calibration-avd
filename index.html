<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acuité Dynamique - Test Final</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
            touch-action: manipulation;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }

        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0; /* ← Masquée par défaut */
            z-index: 1000; /* ← Toujours au-dessus */
            pointer-events: none;
            text-shadow: 0 0 15px black, 0 0 15px black;
            transition: opacity 0.3s ease;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 10px;
            max-width: 320px;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
            display: none; /* ← Masqué au démarrage */
        }

        .stat {
            font-size: 14px;
            margin: 8px 0;
            color: #0ff;
            font-family: 'Courier New', monospace;
        }

        .error {
            color: #ff5555;
        }

        #keyboard {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none; /* ← Masqué au démarrage */
            flex-wrap: wrap;
            justify-content: center;
            z-index: 30;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 15px;
            gap: 8px;
            width: 90%;
            max-width: 550px;
        }

        .key {
            padding: 12px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .key:hover {
            background: #555;
            transform: scale(1.1);
        }

        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        button {
            background: #4ecdc4;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background: #28a745;
        }

        #resultsScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100; /* ← Sous la lettre */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        #resultsScreen h2 {
            color: #0ff;
            margin-bottom: 20px;
        }

        .result-item {
            margin: 10px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Écran de démarrage -->
    <div id="startOverlay">
        <h1>Acuité Dynamique</h1>
        <p>Test de détection visuelle avec suivi de tête.</p>
        <button id="startButton">COMMENCER LE TEST</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <!-- Vidéo en arrière-plan -->
    <video id="video" playsinline autoplay muted></video>

    <!-- Affichage de la lettre (masquée par défaut) -->
    <div id="letterDisplay">A</div>

    <!-- Interface utilisateur (masquée au démarrage) -->
    <div id="ui">
        <div class="stat">Vitesse: <span id="statusSpeed">0</span></div>
        <div class="stat">Distance: <span id="statusDist">-- cm</span></div>
        <div class="stat">Taille lettre: <span id="statusSize">-- px</span></div>
    </div>

    <!-- Clavier virtuel (masqué au démarrage) -->
    <div id="keyboard"></div>

    <!-- Écran de résultats final -->
    <div id="resultsScreen">
        <h2>TEST TERMINÉ</h2>
        <div class="result-item">Essais totaux: <span id="finalTrials">0</span></div>
        <div class="result-item">Réussites: <span id="finalCorrect">0</span></div>
        <div class="result-item">Précision: <span id="finalAccuracy">0%</span></div>
        <div class="result-item">Taille min: <span id="finalMinSize">80</span> px</div>
        <div class="result-item">Erreurs consécutives: <span id="finalConsecutiveErrors">0</span></div>
        <button id="restartButton">RECOMMENCER</button>
    </div>

    <script>
        // ========== INITIALISATION ==========
        const video = document.getElementById('video');
        const letterEl = document.getElementById('letterDisplay');
        const ui = document.getElementById('ui');
        const startOverlay = document.getElementById('startOverlay');
        const keyboard = document.getElementById('keyboard');
        const resultsScreen = document.getElementById('resultsScreen');
        const errorMsg = document.getElementById('errorMsg');

        // Statistiques
        let totalTrials = 0;
        let correctAnswers = 0;
        let consecutiveErrors = 0;
        let state = 'IDLE'; // IDLE, WAITING_VALIDATION, ENDED
        let currentLetter = 'A';
        let letterSizePx = 80;
        let speed = 0;
        let distance = 50;

        // Liste des lettres
        const letters = "D F P V A N L C O E R U S Z H".split(" ");

        // ========== FONCTIONS DE BASE ==========
        function initKeyboard() {
            keyboard.innerHTML = '';
            letters.forEach(letter => {
                const key = document.createElement('button');
                key.className = 'key';
                key.textContent = letter;
                key.onclick = () => validateLetter(letter);
                keyboard.appendChild(key);
            });
        }

        function startTest() {
            startOverlay.style.display = 'none';
            ui.style.display = 'block';
            keyboard.style.display = 'flex';
            state = 'IDLE';
            totalTrials = 0;
            correctAnswers = 0;
            consecutiveErrors = 0;
            letterSizePx = 80;
            updateStats();
        }

        function validateLetter(letter) {
            if (state !== 'WAITING_VALIDATION') return;

            totalTrials++;
            if (letter === currentLetter) {
                correctAnswers++;
                consecutiveErrors = 0;
                // Réduire la taille de la lettre
                letterSizePx = Math.max(20, letterSizePx - 2);
            } else {
                consecutiveErrors++;
                // Augmenter la taille de la lettre
                letterSizePx = Math.min(300, letterSizePx + 2);
            }

            updateLetterDisplay();
            updateStats();
            letterEl.style.opacity = '0';
            state = 'IDLE';

            // Arrêt après 3 erreurs consécutives
            if (consecutiveErrors >= 3) {
                endTest();
            }
        }

        function updateLetterDisplay() {
            currentLetter = letters[Math.floor(Math.random() * letters.length)];
            letterEl.innerText = currentLetter;
            letterEl.style.fontSize = letterSizePx + 'px';
        }

        function updateStats() {
            document.getElementById('statusSpeed').textContent = Math.round(speed);
            document.getElementById('statusDist').textContent = Math.round(distance) + ' cm';
            document.getElementById('statusSize').textContent = letterSizePx + ' px';
        }

        function endTest() {
            state = 'ENDED';
            const accuracy = totalTrials > 0 ? Math.round((correctAnswers / totalTrials) * 100) : 0;

            document.getElementById('finalTrials').textContent = totalTrials;
            document.getElementById('finalCorrect').textContent = correctAnswers;
            document.getElementById('finalAccuracy').textContent = `${accuracy}%`;
            document.getElementById('finalMinSize').textContent = Math.min(80, letterSizePx);
            document.getElementById('finalConsecutiveErrors').textContent = consecutiveErrors;

            resultsScreen.style.display = 'flex';
        }

        // ========== GESTION DES BOUTONS ==========
        document.getElementById('startButton').addEventListener('click', startTest);
        document.getElementById('restartButton').addEventListener('click', () => {
            resultsScreen.style.display = 'none';
            startTest();
        });

        // ========== INITIALISATION ==========
        initKeyboard();
    </script>
</body>
</html>
