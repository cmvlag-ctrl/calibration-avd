<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AVD - Calibration Intelligente</title>
    <style>
        body { 
            margin: 0; 
            background: #111; 
            overflow: hidden; 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
            color: white; 
            touch-action: none; 
            height: 100vh;
            width: 100vw;
        }
        
        /* Vidéo de fond (suivi de tête) */
        video {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            object-fit: cover; 
            opacity: 0.2; /* Légèrement visible pour vérifier que la caméra marche */
            z-index: 1; 
            transform: scaleX(-1); /* Effet miroir pour que ce soit naturel */
        }

        /* Conteneur de la lettre (centré) */
        #letterContainer {
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #letter {
            color: white; 
            font-weight: bold; 
            opacity: 0; /* Invisible par défaut */
            font-family: sans-serif; 
            line-height: 1;
            /* Pas de transition CSS ici pour garantir un affichage net et instantané */
        }

        /* UI de Calibration */
        #uiContainer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 20;
            background: rgba(0, 0, 0, 0.95);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 2px solid #444;
        }

        #calibArea {
            display: none; /* Caché par défaut */
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 10px;
        }

        #calibBarWrapper {
            height: 30px;
            display: flex;
            justify-content: center;
            margin: 15px 0;
            border: 1px dashed #555; /* Cadre de repère */
            width: 15mm; /* Un peu plus large que 10mm pour faciliter la visu */
        }

        #calibBar {
            width: 10mm; /* Taille CSS standard */
            height: 100%;
            background-color: red;
            transform-origin: center; 
            box-shadow: 0 0 5px rgba(255,0,0,0.5);
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 5px 0;
            font-weight: bold;
        }
        
        .btn-save {
            background: #28a745;
        }

        .btn-close {
            background: #6c757d;
        }

        input[type=range] {
            width: 100%;
            max-width: 300px;
            margin: 10px 0;
        }

        #debugInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 12px;
            color: lime;
            z-index: 30;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 4px;
            pointer-events: none;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <video id="video" playsinline autoplay muted></video>
    
    <div id="debugInfo">Initialisation...</div>

    <div id="letterContainer">
        <div id="letter">E</div>
    </div>

    <!-- Interface de Calibration -->
    <div id="uiContainer">
        <button id="toggleCalibBtn" class="btn">⚙️ Configurer l'écran</button>
        
        <div id="calibArea">
            <p style="font-size: 14px; color: #ddd; margin: 0 0 10px 0; text-align: center;">
                1. Posez une vraie règle sur l'écran.<br>
                2. Bougez le curseur pour que la barre rouge fasse <b>exactement 1 cm</b>.<br>
                <small>Ce réglage sera sauvé pour votre appareil.</small>
            </p>
            
            <div id="calibBarWrapper">
                <div id="calibBar"></div>
            </div>

            <input type="range" id="calibSlider" min="0.5" max="2.5" step="0.01" value="1.0">
            <div style="font-size: 12px; color: #aaa;">Facteur: <span id="factorVal">1.00</span></div>
            
            <button id="saveCalibBtn" class="btn btn-save">✅ Valider et Sauvegarder</button>
            <button id="closeCalibBtn" class="btn btn-close">Fermer sans changer</button>
        </div>
    </div>

    <!-- Bibliothèques MediaPipe (Suivi de visage) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        // --- CONFIGURATION ---
        const letters = ['C', 'D', 'E', 'F', 'L', 'O', 'P', 'T', 'Z'];
        const acuityDecimal = 1.0; // 10/10ème
        const distanceCm = 40;     // Distance écran-visage estimée
        const displayDuration = 60; // Durée d'affichage en ms
        const speedThreshold = 1500; // Vitesse min en px/s (env. 150°/sec selon l'écran)
        const rebondDelay = 800; // Temps min entre deux lettres (ms)

        // --- VARIABLES SYSTÈME ---
        let calibrationFactor = 1.0;
        let lastDisplayTime = 0;
        let lastHeadPos = { x: 0, y: 0 };
        let lastTime = 0;

        // Éléments DOM
        const video = document.getElementById('video');
        const letterEl = document.getElementById('letter');
        const debugEl = document.getElementById('debugInfo');
        const calibBar = document.getElementById('calibBar');
        const calibSlider = document.getElementById('calibSlider');
        const factorVal = document.getElementById('factorVal');
        
        const toggleCalibBtn = document.getElementById('toggleCalibBtn');
        const calibArea = document.getElementById('calibArea');
        const saveCalibBtn = document.getElementById('saveCalibBtn');
        const closeCalibBtn = document.getElementById('closeCalibBtn');

        // --- 1. GESTION CALIBRATION ---
        function initCalibration() {
            // Tente de charger la calibration sauvegardée
            const saved = localStorage.getItem('avd_calib_v1');
            if (saved) {
                calibrationFactor = parseFloat(saved);
            }
            // Mise à jour initiale de l'UI
            calibSlider.value = calibrationFactor;
            updateCalibUI();
        }

        function updateCalibUI() {
            // Applique le facteur à la barre rouge
            calibBar.style.transform = `scale(${calibrationFactor})`;
            factorVal.innerText = calibrationFactor.toFixed(2);
        }

        // Événements Boutons
        toggleCalibBtn.addEventListener('click', () => {
            calibArea.style.display = 'flex';
        });

        closeCalibBtn.addEventListener('click', () => {
            calibArea.style.display = 'none';
            // Recharge la valeur sauvegardée si on annule
            const saved = localStorage.getItem('avd_calib_v1');
            if(saved) {
                calibrationFactor = parseFloat(saved);
                calibSlider.value = calibrationFactor;
                updateCalibUI();
            }
        });

        calibSlider.addEventListener('input', (e) => {
            calibrationFactor = parseFloat(e.target.value);
            updateCalibUI();
        });

        saveCalibBtn.addEventListener('click', () => {
            localStorage.setItem('avd_calib_v1', calibrationFactor);
            calibArea.style.display = 'none';
            debugEl.innerText = "Calibration sauvegardée !";
            setTimeout(() => debugEl.innerText = "", 2000);
        });

        // --- 2. CALCUL TAILLE LETTRE (Optométrie) ---
        function getLetterPixelSize() {
            // Création d'un élément temporaire pour mesurer 1mm réel sur CET écran
            const dummy = document.createElement('div');
            dummy.style.width = '1mm';
            dummy.style.height = '1mm';
            dummy.style.position = 'absolute';
            dummy.style.visibility = 'hidden';
            document.body.appendChild(dummy);
            
            // Combien de pixels valent 1mm physiquement sur cet écran ?
            const pxPerMm = dummy.getBoundingClientRect().width;
            document.body.removeChild(dummy);

            // Formule optométrique : Taille (mm) = Distance (cm) * 0.0291 / Acuité
            const theoreticalSizeMm = (distanceCm * 0.0291) / acuityDecimal;

            // Application de la calibration utilisateur
            const finalPx = theoreticalSizeMm * pxPerMm * calibrationFactor;
            
            return Math.round(finalPx);
        }

        function showLetter() {
            // Choisir une lettre au hasard
            const char = letters[Math.floor(Math.random() * letters.length)];
            letterEl.innerText = char;
            
            // Ajuster la taille dynamique
            letterEl.style.fontSize = `${getLetterPixelSize()}px`;
            
            // Afficher
            letterEl.style.opacity = 1;
            
            // Masquer après 60ms
            setTimeout(() => {
                letterEl.style.opacity = 0;
            }, displayDuration);
        }

        // --- 3. LOGIQUE DE SUIVI (MediaPipe) ---
        function onResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                // On suit le bout du nez (landmark 1) pour la stabilité
                const nose = landmarks[1]; 
                
                // Convertir coordonnées normalisées (0-1) en pixels
                const x = nose.x * window.innerWidth;
                const y = nose.y * window.innerHeight;
                
                const now = performance.now();

                // Calcul de la vitesse seulement si on a un point de référence précédent
                if (lastTime !== 0) {
                    const dt = now - lastTime; // delta temps en ms
                    
                    if (dt > 0) {
                        const dx = x - lastHeadPos.x;
                        const dy = y - lastHeadPos.y;
                        const distPx = Math.sqrt(dx*dx + dy*dy);
                        
                        // Vitesse en pixels par seconde
                        const speedPxSec = (distPx / dt) * 1000;
                        
                        // Affichage debug (optionnel, à retirer en prod)
                        // debugEl.innerText = `V: ${Math.round(speedPxSec)} px/s`;

                        // SEUIL DE DÉCLENCHEMENT
                        if (speedPxSec > speedThreshold) {
                            // Éviter les déclenchements en rafale (anti-rebond)
                            if (now - lastDisplayTime > rebondDelay) {
                                showLetter();
                                lastDisplayTime = now;
                                // debugEl.innerText = "LETTRE !";
                            }
                        }
                    }
                }

                // Mise à jour pour la prochaine frame
                lastHeadPos = { x, y };
                lastTime = now;
            }
        }

        // Initialisation MediaPipe FaceMesh
        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});
        
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true, // Meilleure précision pour les yeux/nez
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        faceMesh.onResults(onResults);

        // Initialisation Caméra
        const camera = new Camera(video, {
            onFrame: async () => {
                await faceMesh.send({image: video});
            },
            width: 640,
            height: 480
        });
        
        // Démarrage global
        initCalibration();
        camera.start()
            .then(() => debugEl.innerText = "Système prêt. Bougez la tête vite !")
            .catch(err => debugEl.innerText = "Erreur Caméra: " + err);

    </script>
</body>
</html>
