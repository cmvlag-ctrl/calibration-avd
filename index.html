<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Mode Concentration</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; user-select: none; }
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.2; z-index: 1; transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px; font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            text-shadow: 0 0 10px black;
        }

        /* Interface Minimaliste */
        #toggleSettings {
            position: absolute; top: 10px; left: 10px; z-index: 30;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 5px 10px; border-radius: 20px;
            cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        #toggleSettings:hover { background: rgba(255,255,255,0.3); }

        #mainUI {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 20;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* Panneau de détails (Caché par défaut) */
        #detailsPanel {
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 0 0 15px 0;
            width: 280px; pointer-events: auto;
            transform: translateX(-120%); transition: transform 0.3s ease;
        }
        #detailsPanel.visible { transform: translateX(0); }

        .stat { font-size: 13px; margin: 4px 0; color: #0f0; font-family: monospace; display: flex; justify-content: space-between; }
        .stat span { color: #fff; }
        
        /* Jauge de vitesse (Toujours visible) */
        .gauge-container {
            width: 80%; height: 10px; margin: 0 auto 30px auto;
            background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto;
        }
        .speed-bar {
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, #00ff88 0%, #ffff00 70%, #ff0055 100%);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(0,255,136,0.3);
        }

        /* Contrôles dans le panneau */
        .control-group { margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }
        input[type=range] { width: 100%; margin: 5px 0; accent-color: #4ecdc4; }
        button {
            background: #4ecdc4; border: none; padding: 8px; border-radius: 5px;
            cursor: pointer; font-weight: bold; width: 100%; color: #000; margin-top: 5px;
        }
        button.secondary { background: #555; color: white; }
        #calibPanel { display: none; margin-top: 10px; text-align: center; }
        .calib-bar-container {
            height: 20px; border: 1px dashed #666; margin: 10px auto;
            display: flex; justify-content: center; align-items: center; width: 12mm;
        }
        .calib-bar { height: 100%; background: red; width: 10mm; transform-origin: center; }

        /* Overlay de démarrage */
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1>Entraînement AVD</h1>
        <p style="color:#aaa; font-size:14px;">Mode concentration activé</p>
        <button onclick="startApp()" style="width:auto; padding:15px 30px; font-size:18px;">DÉMARRER</button>
        <p id="errorMsg" style="color:#f55; margin-top:20px;"></p>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay">A</div>

    <div id="mainUI">
        <!-- Bouton pour afficher les réglages -->
        <button id="toggleSettings" onclick="toggleDetails()">⚙️ Réglages</button>

        <!-- Panneau détaillé (Caché au début) -->
        <div id="detailsPanel">
            <div class="stat">Vitesse: <span id="valSpeed">0</span></div>
            <div class="stat">Distance: <span id="valDist">--</span> cm</div>
            <div class="stat">Taille Lettre: <span id="valSize">--</span> px</div>
            
            <div class="control-group">
                <div class="stat">Acuité Visuelle: <span id="valAcuity">1.0</span></div>
                <input type="range" id="acuity" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateParams()">
                
                <button class="secondary" onclick="toggleCalib()">📏 Calibrer Écran</button>
                
                <div id="calibPanel">
                    <p style="font-size:11px; margin:5px 0; color:#ddd;">Régler barre rouge = 1cm</p>
                    <div class="calib-bar-container"><div class="calib-bar" id="calibBar"></div></div>
                    <input type="range" id="calibSlider" min="0.5" max="2.0" step="0.05" value="1.0" oninput="updateCalib()">
                    <button onclick="saveCalib()" style="background:#28a745;">OK</button>
                </div>
            </div>
        </div>

        <!-- Jauge de vitesse toujours visible en bas -->
        <div class="gauge-container">
            <div class="speed-bar" id="speedBar"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>

    <script>
        let model = null;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        
        // Paramètres
        let acuity = 1.0; 
        let screenDPI = 300; 
        let calibrationFactor = 1.0; 
        let detailsVisible = false;

        // Tracking
        let lastHeadPos = null;
        let lastTime = 0;
        let speed = 0;
        let smoothedSpeed = 0;
        let distance = 50; 
        let rawDistance = 50;
        let state = 'IDLE'; 
        let lastFlashTime = 0;
        const letters = "C D F H L N O P T U V Z".split(" ");

        // --- UI ---
        function toggleDetails() {
            detailsVisible = !detailsVisible;
            const panel = document.getElementById('detailsPanel');
            const btn = document.getElementById('toggleSettings');
            if(detailsVisible) {
                panel.classList.add('visible');
                btn.innerText = "✖ Fermer";
            } else {
                panel.classList.remove('visible');
                btn.innerText = "⚙️ Réglages";
            }
        }

        function toggleCalib() {
            const panel = document.getElementById('calibPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }
        function updateCalib() {
            calibrationFactor = parseFloat(document.getElementById('calibSlider').value);
            document.getElementById('calibBar').style.transform = `scaleX(${calibrationFactor})`;
        }
        function saveCalib() {
            localStorage.setItem('avd_blazeface_calib_v4', calibrationFactor);
            document.getElementById('calibPanel').style.display = 'none';
            updateStats();
        }
        function loadCalib() {
            const saved = localStorage.getItem('avd_blazeface_calib_v4');
            if (saved) {
                calibrationFactor = parseFloat(saved);
                document.getElementById('calibSlider').value = calibrationFactor;
                updateCalib();
            }
        }

        // --- DÉMARRAGE ---
        async function startApp() {
            loadCalib();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    document.getElementById('startOverlay').style.display = 'none';
                    video.play();
                    model = await blazeface.load();
                    
                    const dpr = window.devicePixelRatio || 1;
                    let baseDPI = dpr > 2 ? 450 : (dpr > 1 ? 300 : 150);
                    screenDPI = baseDPI * calibrationFactor; 
                    loop();
                };
            } catch (err) {
                document.getElementById('errorMsg').innerText = "Erreur Caméra : " + err.message;
            }
        }

        // --- BOUCLE ---
        async function loop() {
            if (!model) return;
            const predictions = await model.estimateFaces(video, false);

            if (predictions.length > 0) {
                const face = predictions[0];
                const nose = face.landmarks[2];
                const leftEye = face.landmarks[0];
                const rightEye = face.landmarks[1];

                // Distance
                const distInterYeuxPx = Math.sqrt(
                    Math.pow(rightEye[0] - leftEye[0], 2) + 
                    Math.pow(rightEye[1] - leftEye[1], 2)
                );
                const K_FACTOR = 2800; 
                if (distInterYeuxPx > 5) {
                    let calculatedDist = K_FACTOR / distInterYeuxPx;
                    rawDistance = calculatedDist;
                    distance = (distance * 0.9) + (rawDistance * 0.1);
                    distance = Math.max(30, Math.min(120, distance));
                }

                // Vitesse
                const now = performance.now();
                if (lastHeadPos) {
                    const dt = (now - lastTime);
                    if (dt > 16) {
                        const dx = nose[0] - lastHeadPos.x;
                        const dy = nose[1] - lastHeadPos.y;
                        const distPx = Math.sqrt(dx*dx + dy*dy);
                        let rawSpeed = distPx / dt; 
                        smoothedSpeed = (smoothedSpeed * 0.7) + (rawSpeed * 0.3);
                        speed = smoothedSpeed * 1000; 
                    }
                }
                lastHeadPos = { x: nose[0], y: nose[1] };
                lastTime = now;

                handleState(speed, now);
                updateStats(); // Mise à jour de la jauge même si panneau caché
            } else {
                smoothedSpeed = smoothedSpeed * 0.9;
                speed = smoothedSpeed * 1000;
                updateStats();
            }
            requestAnimationFrame(loop);
        }

        // --- LOGIQUE AFFICHAGE ---
        function handleState(currentSpeed, now) {
            const minSpeedTrigger = 150; 
            const flashDuration = 60;    
            const cooldownDuration = 1000; 

            if (state === 'IDLE') {
                if (currentSpeed > minSpeedTrigger && (now - lastFlashTime > cooldownDuration)) {
                    state = 'FLASH';
                    lastFlashTime = now;
                    const randomLetter = letters[Math.floor(Math.random() * letters.length)];
                    letterEl.innerText = randomLetter;
                    letterEl.style.fontSize = calculateSize(distance, acuity) + 'px';
                    letterEl.style.opacity = '1';
                    setTimeout(() => {
                        letterEl.style.opacity = '0';
                        state = 'IDLE';
                    }, flashDuration);
                }
            }
        }

        function calculateSize(distCm, acuityDecimal) {
            let heightCm = (distCm * 0.0145) / acuityDecimal;
            let heightPx = (heightCm / 2.54) * screenDPI;
            return Math.max(20, Math.round(heightPx));
        }

        function updateParams() {
            acuity = parseFloat(document.getElementById('acuity').value);
            document.getElementById('valAcuity').innerText = acuity.toFixed(1);
        }

        function updateStats() {
            // Mise à jour du panneau détaillé (seulement si visible pour perf)
            if(detailsVisible) {
                document.getElementById('valSpeed').innerText = Math.round(speed);
                document.getElementById('valDist').innerText = Math.round(distance);
                document.getElementById('valSize').innerText = calculateSize(distance, acuity);
            }

            // Mise à jour Jauge (Toujours faite)
            // Seuil visuel à 250 pour remplir la barre
            let pct = Math.min(100, (speed / 250) * 100);
            document.getElementById('speedBar').style.width = `${pct}%`;
        }
    </script>
</body>
</html>
