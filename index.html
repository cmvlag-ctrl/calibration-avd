<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test d'Acuité Visuelle</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            background: #000; color: #fff;
            font-family: Arial, sans-serif;
        }
        video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
            font-weight: bold;
            color: #fff;
            font-size: 100px;
            opacity: 0;
            transition: opacity 0.05s;
            text-shadow: 0 0 10px black;
        }
        #ui {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 10px;
            border-radius: 5px; max-width: 300px;
        }
        #controls {
            margin-top: 10px;
        }
        #controls button {
            padding: 5px 15px; font-size: 16px;
            cursor: pointer; background: #222; color: #fff;
            border: 1px solid #555; border-radius: 3px;
        }
        #controls button:hover { background: #555; }
        #letterSizeInput {
            width: 60px; padding: 5px;
            background: #222; color: #fff; border: 1px solid #555;
        }
        
        /* Mode debug */
        #debugBox {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.7); padding: 10px;
            border-radius: 5px; font-size: 12px;
            font-family: monospace; color: #0f0;
        }
        
        /* Clavier virtuel */
        #keyboard {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px; z-index: 20;
        }
        .key {
            border: 1px solid #444; border-radius: 5px;
            font-size: 18px; font-weight: bold;
            cursor: pointer; user-select: none;
            background: #222; color: #fff;
            padding: 10px 15px;
        }
        .key:hover { background: #444; }
        
        /* Overlay de démarrage */
        #startOverlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #startOverlay h1 {
            margin-bottom: 20px;
        }
        #startBtn {
            padding: 15px 40px; font-size: 20px;
            cursor: pointer; background: #222; color: #fff;
            border: 2px solid #0f0; border-radius: 5px;
        }
        #startBtn:hover { background: #0c0; }

        .error { color: #f55; }
        
        @media (max-width: 600px) {
            #keyboard { gap: 3px; padding: 10px; }
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="letterDisplay">A</div>
    
    <div id="ui">
        <div>Score: <span id="scoreDisplay">0</span></div>
        <div>Erreurs: <span id="errorDisplay" class="error">0</span></div>
        <div>Taille: <span id="sizeDisplay">100</span>px</div>
        <div>Acuité: <span id="acuityDisplay">10/10</span></div>
        <div id="controls">
            <span>Taille:</span>
            <button id="decreaseBtn">-</button>
            <input id="letterSizeInput" type="number" value="100" min="20" max="500">
            <button id="increaseBtn">+</button>
        </div>
    </div>
    
    <div id="keyboard"></div>
    <div id="debugBox"></div>
    
    <div id="startOverlay">
        <h1>Test d'Acuité Visuelle</h1>
        <p>Cliquez sur "Démarrer" pour commencer le test</p>
        <button id="startBtn">Démarrer</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const letterDisplay = document.getElementById('letterDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const errorDisplay = document.getElementById('errorDisplay');
        const sizeDisplay = document.getElementById('sizeDisplay');
        const acuityDisplay = document.getElementById('acuityDisplay');
        const keyboard = document.getElementById('keyboard');
        const debugBox = document.getElementById('debugBox');
        const letterSizeInput = document.getElementById('letterSizeInput');
        
        // État global
        let isRunning = false;
        let currentLetter = '';
        let errors = 0;
        let correctAnswers = 0;
        let startTime = null;
        let lastFaceData = null;
        let letterSize = 100;
        let faceMesh = null;
        let camera = null;
        let screenDPI = 96;
        let showLetterTimeout = null;
        
        // Configuration lettres
        const letters = 'ECDFZPOTHXKYVUBA';
        const defaultSize = 100;
        const minSize = 20;
        const maxSize = 500;
        
        // Initialisation clavier
        for (let i = 0; i < letters.length; i++) {
            const key = document.createElement('div');
            key.className = 'key';
            key.textContent = letters[i];
            key.onclick = () => handleKeyPress(letters[i]);
            keyboard.appendChild(key);
        }
        
        // Ajustement grille clavier selon écran
        function adjustKeyboardGrid() {
            const width = window.innerWidth;
            if (width < 500) {
                keyboard.style.gridTemplateColumns = 'repeat(5, 1fr)';
            } else {
                keyboard.style.gridTemplateColumns = 'repeat(10, 1fr)';
            }
        }
        adjustKeyboardGrid();
        
        // Gestion touches clavier physique
        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (letters.includes(key)) {
                handleKeyPress(key);
            }
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toUpperCase();
        });
        
        // Contrôles manuels
        document.getElementById('decreaseBtn').onclick = () => {
            if (letterSize > minSize) {
                letterSize -= 10;
                letterSizeInput.value = letterSize;
                updateAcuityFromSize();
                showLetter();
            }
        };
        
        document.getElementById('increaseBtn').onclick = () => {
            if (letterSize < maxSize) {
                letterSize += 10;
                letterSizeInput.value = letterSize;
                updateAcuityFromSize();
                showLetter();
            }
        };
        
        letterSizeInput.onchange = (e) => {
            letterSize = Math.max(minSize, Math.min(maxSize, parseInt(e.target.value) || defaultSize));
            e.target.value = letterSize;
            updateAcuityFromSize();
            showLetter();
        };
        
        // Gestion réponse utilisateur
        function handleKeyPress(key) {
            if (!isRunning || !currentLetter) return;
            
            const now = Date.now();
            
            if (key === currentLetter) {
                // Correct
                correctAnswers++;
                scoreDisplay.textContent = correctAnswers;
                
                if (letterSize > minSize) {
                    letterSize -= 5;
                    letterSizeInput.value = letterSize;
                }
            } else {
                // Erreur
                errors++;
                errorDisplay.textContent = errors;
                
                if (letterSize < maxSize) {
                    letterSize += 10;
                    letterSizeInput.value = letterSize;
                }
            }
            
            updateAcuityFromSize();
            showLetter();
            
            // Mise à jour temps
            if (startTime) {
                const elapsed = Math.floor((now - startTime) / 1000);
                debugBox.textContent = `Temps: ${elapsed}s | Dist: --`;
            }
        }
        
        function updateAcuityFromSize() {
            // Calcul approximatif de l'acuité (basé sur la taille des lettres en mm)
            const sizeInMm = letterSize / screenDPI * 25.4;
            const acuity = Math.round(10 / (sizeInMm / 5)) * 10 / 10;
            acuityDisplay.textContent = Math.max(1, Math.min(20, acuity)) + '/10';
            sizeDisplay.textContent = letterSize;
        }
        
        // Affichage lettre - CORRIGÉ : la lettre disparaît toujours après le délai
        function showLetter() {
            // Annuler le timeout précédent si existant
            if (showLetterTimeout) {
                clearTimeout(showLetterTimeout);
            }
            
            // Nouvelle lettre aléatoire
            currentLetter = letters[Math.floor(Math.random() * letters.length)];
            letterDisplay.textContent = currentLetter;
            letterDisplay.style.fontSize = letterSize + 'px';
            letterDisplay.style.opacity = 1;
            
            // Masquer après délai - fonctionne même après erreur
            showLetterTimeout = setTimeout(() => {
                letterDisplay.style.opacity = 0;
                currentLetter = '';
            }, 1500);
        }
        
        // Initialisation FaceMesh
        async function initFaceMesh() {
            faceMesh = new FaceMesh({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                }
            });
            
            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            faceMesh.onResults(onFaceMeshResults);
            
            camera = new Camera(video, {
                onFrame: async () => {
                    if (faceMesh && isRunning) {
                        await faceMesh.send({image: video});
                    }
                },
                width: 640,
                height: 480
            });
            
            await camera.start();
        }
        
        // Traitement résultats FaceMesh - CORRIGÉ : suppression de l'adaptation de taille basée sur la distance
        function onFaceMeshResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                
                const nose = landmarks[1];
                const leftEye = landmarks[33];
                const rightEye = landmarks[263];
                
                // Distance des yeux en pixels (approximatif)
                const eyeDistancePx = Math.hypot(
                    rightEye.x * video.videoWidth - leftEye.x * video.videoWidth,
                    rightEye.y * video.videoHeight - leftEye.y * video.videoHeight
                );
                
                // Estimation distance visage (en cm) -只是一种近似
                const realEyeDistanceCm = 6.5;
                const focalLength = 800;
                const distance = Math.round((realEyeDistanceCm * focalLength) / eyeDistancePx);
                
                // Affichage debug UNIQUEMENT - pas d'adaptation de taille
                if (distance > 20 && distance < 200) {
                    debugBox.textContent = `Dist: ${distance}cm | Taille: ${letterSize}px`;
                }
                
                lastFaceData = { distance, eyeDistancePx };
            }
        }
        
        function updateParams() {
            // Pas d'adaptation de la taille basée sur la distance
            // La taille est gérée uniquement par les boutons + / - et les réponses utilisateur
            updateAcuityFromSize();
        }
        
        // Boucle principale
        function loop() {
            if (isRunning) {
                updateParams();
                
                if (!currentLetter) {
                    showLetter();
                }
            }
            requestAnimationFrame(loop);
        }
        
        // Démarrage
        document.getElementById('startBtn').onclick = async () => {
            document.getElementById('startOverlay').style.display = 'none';
            
            try {
                await initFaceMesh();
                isRunning = true;
                startTime = Date.now();
                letterSize = defaultSize;
                letterSizeInput.value = letterSize;
                updateAcuityFromSize();
                loop();
                
                // Afficher première lettre
                setTimeout(showLetter, 1000);
            } catch (err) {
                console.error('Erreur:', err);
                debugBox.textContent = 'Erreur caméra: ' + err.message;
            }
        };
        
        // Initialisation acuité
        letterSize = defaultSize;
        updateAcuityFromSize();
    </script>

</body>
</html>
