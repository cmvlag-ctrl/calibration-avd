<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée avec Clavier</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.2; z-index: 1; transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px; font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            text-shadow: 0 0 10px black;
            max-width: 90vw;
            text-align: center;
        }
        #ui {
            position: absolute; top: 10px; left: 10px; z-index: 20;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            max-width: 300px;
        }
        #scoreTopPanel {
            position: fixed; top: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 10px 20px;
            border-radius: 8px; z-index: 20;
            display: flex; gap: 20px;
        }
        .stat { font-size: 12px; margin: 2px 0; color: #0f0; font-family: monospace; }
        .error { color: #f55; }
        .speed-gauge {
            height: 6px; background: #333; margin-top: 5px; border-radius: 3px; overflow: hidden;
        }
        .speed-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s linear;
        }
        button {
            background: #4ecdc4; border: none; padding: 10px; border-radius: 5px;
            cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px;
        }
        button.secondary { background: #555; color: white; }
        #calibPanel {
            display: none; margin-top: 10px; padding-top: 10px;
            border-top: 1px solid #444; text-align: center;
        }
        .calib-bar-container {
            height: 20px; border: 1px dashed #666; margin: 10px auto;
            display: flex; justify-content: center; align-items: center; width: 200px;
        }
        .calib-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, #0f0, #ff0, #f00);
        }
        .keyboard {
            position: fixed; bottom: 10px; left: 0; right: 0;
            background: rgba(0,0,0,0.8); padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 20;
        }
        .keyboard-row {
            display: flex; gap: 5px; margin-bottom: 5px;
        }
        .key {
            background: #333; color: white; border: none; padding: 15px 20px;
            border-radius: 5px; font-size: 18px; cursor: pointer;
            min-width: 40px; text-align: center;
        }
        .key.special {
            background: #4ecdc4; width: auto; padding: 15px 30px;
        }
        #calibBtn { background: #555 !important; }
    </style>
</head>
<body>
    <video id="video" autoplay></video>
    <div id="letterDisplay"></div>

    <div id="scoreTopPanel">
        <div>
            <div class="stat">Score: <span id="scorePercent">--%</span> | Min: <span id="minSize">--</span> px</div>
        </div>
        <div>
            <div class="stat">Vitesse: <span id="statusSpeed">0</span></div>
            <div class="stat">Dist: <span id="statusDist">~0 cm</span></div>
        </div>
        <div>
            <div class="stat">Taille: <span id="statusSize">0 px</span></div>
        </div>
    </div>

    <div id="ui">
        <div class="stat error" id="statusMessage"></div>
        <div class="speed-gauge">
            <div class="speed-bar" id="speedBar"></div>
        </div>
        <div id="calibPanel">
            <div class="calib-bar-container">
                <div class="calib-bar" id="calibBar"></div>
            </div>
            <button id="calibBtn" class="secondary">Calibrer</button>
        </div>
        <button id="restartBtn">Recommencer</button>
    </div>

    <div class="keyboard">
        <div class="keyboard-row">
            <button class="key">A</button>
            <button class="key">C</button>
            <button class="key">D</button>
            <button class="key">E</button>
            <button class="key">F</button>
            <button class="key">H</button>
            <button class="key">L</button>
        </div>
        <div class="keyboard-row">
            <button class="key">N</button>
            <button class="key">O</button>
            <button class="key">P</button>
            <button class="key">R</button>
            <button class="key">S</button>
            <button class="key">U</button>
            <button class="key">V</button>
        </div>
        <div class="keyboard-row" style="justify-content: space-between;">
            <button class="key special" id="calibBtnBottom">🔄 Calibrer</button>
            <button class="key" id="zKey" style="flex-grow: 1; margin: 0 10px;">Z</button>
            <button class="key special" id="endBtn" style="background: #ffd700; color: black;">FIN</button>
        </div>
    </div>

    <script>
        // --- INITIALISATION ---
        const video = document.getElementById('video');
        const letterEl = document.getElementById('letterDisplay');
        const statusMsg = document.getElementById('statusMessage');
        const scorePercentEl = document.getElementById('scorePercent');
        const minSizeEl = document.getElementById('minSize');
        const statusSpeedEl = document.getElementById('statusSpeed');
        const statusDistEl = document.getElementById('statusDist');
        const statusSizeEl = document.getElementById('statusSize');
        const speedBar = document.getElementById('speedBar');
        const calibBtnTop = document.getElementById('calibBtn');
        const calibBtnBottom = document.getElementById('calibBtnBottom');
        const endBtn = document.getElementById('endBtn');
        const zKey = document.getElementById('zKey');
        const restartBtn = document.getElementById('restartBtn');

        // --- VARIABLES ---
        let state = 'IDLE';
        let currentDisplayedLetter = '';
        let lastFlashTime = 0;
        let flashTimeout;
        let flashDuration = 60;
        let cooldownDuration = 1000;
        let minSpeedTrigger = 150;
        let currentSpeed = 0;
        let distance = 50;
        let letterSizePx = 300;
        let minSizeAchieved = 300;
        let score = 0;
        let letters = ['A', 'C', 'D', 'E', 'F', 'H', 'L', 'N', 'O', 'P', 'R', 'S', 'U', 'V'];
        let screenDPI = 96;
        let lastValidationTime = 0;
        let validationCooldown = 500;

        // --- DÉTECTION DE MOUVEMENT ---
        let lastX = 0;
        let lastY = 0;
        let lastTime = 0;

        // --- INITIALISATION VIDÉO ---
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                statusMsg.textContent = "Erreur caméra: " + err.message;
            });

        // --- DÉTECTION DE MOUVEMENT ---
        function detectMovement() {
            const now = Date.now();
            const ctx = video.getContext('2d');
            ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);

            const imageData = ctx.getImageData(0, 0, video.videoWidth, video.videoHeight);
            let totalDiff = 0;
            let pixelCount = 0;

            for (let i = 0; i < imageData.data.length; i += 4) {
                const r = imageData.data[i];
                const g = imageData.data[i+1];
                const b = imageData.data[i+2];
                const avg = (r + g + b) / 3;
                totalDiff += Math.abs(avg - 128);
                pixelCount++;
            }

            const avgDiff = totalDiff / pixelCount;
            const normalizedDiff = avgDiff / 255;
            const motionFactor = normalizedDiff * 100;

            // Calcul de la vitesse approximative (simplifié)
            const deltaTime = (now - lastTime) / 1000;
            lastTime = now;

            if (deltaTime > 0) {
                const dx = (motionFactor - 50) * 2; // Simuler un mouvement
                currentSpeed = Math.abs(dx) / deltaTime;
            }

            updateStats();
            requestAnimationFrame(detectMovement);
        }

        // --- GESTION DES LETTRES ---
        function showLetter() {
            if (state !== 'IDLE') return;

            state = 'WAITING_VALIDATION';
            currentDisplayedLetter = letters[Math.floor(Math.random() * letters.length)];
            letterEl.innerText = currentDisplayedLetter;
            letterEl.style.opacity = '1';
            letterEl.style.fontSize = `${letterSizePx}px`;

            flashTimeout = setTimeout(() => {
                if (state === 'WAITING_VALIDATION') {
                    letterEl.style.opacity = '0';
                    state = 'IDLE';
                }
            }, flashDuration);
        }

        // --- VALIDATION ---
        document.addEventListener('keydown', (e) => {
            if (state !== 'WAITING_VALIDATION') return;

            const now = Date.now();
            if (now - lastValidationTime < validationCooldown) return;
            lastValidationTime = now;

            const isCorrect = e.key.toUpperCase() === currentDisplayedLetter;

            if (isCorrect) {
                score++;
                letterSizePx = Math.max(20, letterSizePx - 10);
                if (letterSizePx < minSizeAchieved) {
                    minSizeAchieved = letterSizePx;
                }
            } else {
                letterSizePx = Math.min(300, letterSizePx + 10);
            }

            updateScore();
            clearTimeout(flashTimeout);
            letterEl.style.opacity = '0';
            state = 'IDLE';

            setTimeout(showLetter, 500);
        });

        // --- MISE À JOUR SCORE ---
        function updateScore() {
            const percentage = Math.round((minSizeAchieved / 300) * 100);
            scorePercentEl.textContent = `${percentage}%`;
            minSizeEl.textContent = `${minSizeAchieved} px`;
        }

        // --- MISE À JOUR STATISTIQUES ---
        function updateStats() {
            statusSpeedEl.textContent = Math.round(currentSpeed);
            statusDistEl.textContent = `~${distance} cm`;
            statusSizeEl.textContent = `${letterSizePx} px`;

            let pct = Math.min(100, (currentSpeed / 250) * 100);
            speedBar.style.width = `${pct}%`;

            if (currentSpeed > 150) {
                speedBar.style.background = '#f00';
            } else {
                speedBar.style.background = 'linear-gradient(90deg, #0f0, #ff0, #f00)';
            }
        }

        // --- BOUTONS ---
        calibBtnTop.addEventListener('click', () => {
            statusMsg.textContent = "Calibration en cours...";
            setTimeout(() => {
                distance = 50;
                letterSizePx = 300;
                minSizeAchieved = 300;
                updateScore();
                statusMsg.textContent = "Calibration terminée";
            }, 2000);
        });

        calibBtnBottom.addEventListener('click', calibBtnTop.click);

        endBtn.addEventListener('click', () => {
            if (confirm("Voulez-vous vraiment quitter le test ?")) {
                window.close();
            }
        });

        zKey.addEventListener('click', () => {
            // Simuler la touche Z
            const event = new KeyboardEvent('keydown', { key: 'Z', code: 'KeyZ' });
            document.dispatchEvent(event);
        });

        restartBtn.addEventListener('click', () => {
            score = 0;
            minSizeAchieved = 300;
            letterSizePx = 300;
            updateScore();
        });

        // --- DÉMARRAGE ---
        detectMovement();
        setTimeout(showLetter, 3000);
    </script>
</body>
</html>
