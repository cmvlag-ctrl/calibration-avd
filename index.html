<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.2; z-index: 1; transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px; font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            text-shadow: 0 0 10px black;
        }
        #ui {
            position: absolute; top: 10px; left: 10px; z-index: 20;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            max-width: 300px;
        }
        .stat { font-size: 12px; margin: 2px 0; color: #0f0; font-family: monospace; }
        .error { color: #f55; }

        /* Jauge de vitesse */
        .speed-gauge {
            height: 6px; background: #333; margin-top: 5px; border-radius: 3px; overflow: hidden;
        }
        .speed-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s linear;
        }

        button {
            background: #4ecdc4; border: none; padding: 10px; border-radius: 5px;
            cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px;
        }
        button.secondary { background: #555; color: white; }
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        #calibPanel {
            display: none; margin-top: 10px; padding-top: 10px;
            border-top: 1px solid #444; text-align: center;
        }
        .calib-bar-container {
            height: 20px; border: 1px dashed #666; margin: 10px auto;
            display: flex; justify-content: center; align-items: center; width: 12mm;
        }
        .calib-bar { height: 100%; background: red; width: 10mm; transform-origin: center; }

        /* Contrôle pour la taille des lettres */
        #letterSizeControl {
            position: absolute; top: 10px; right: 10px; z-index: 20;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            width: 120px;
            text-align: center;
        }
        #letterSizeLabel {
            font-size: 11px; margin-bottom: 5px;
        }
        #letterSizeValue {
            font-size: 16px; font-weight: bold; margin: 5px 0;
            color: #4ecdc4;
        }
        .size-control-buttons {
            display: flex; justify-content: center; gap: 5px;
        }
        .size-btn {
            width: 30px; height: 30px; font-size: 18px; font-weight: bold;
            background: #555; padding: 0; line-height: 28px;
        }
        .size-btn:hover {
            background: #777;
        }
        #letterSizeInput {
            width: 60px; text-align: center; background: #333; color: white;
            border: 1px solid #555; border-radius: 4px; padding: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1>Test Acuité (Pro)</h1>
        <p>Détection de vitesse optimisée.</p>
        <button onclick="startApp()">DÉMARRER</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay">A</div>

    <div id="ui" style="display:none;">
        <div class="stat" id="statusInit">Initialisation...</div>
        <div class="stat" id="statusSpeed">Vitesse: 0</div>
        <!-- Jauge visuelle -->
        <div class="speed-gauge"><div class="speed-bar" id="speedBar"></div></div>

        <div class="stat" id="statusDist" style="margin-top:5px;">Distance: -- cm</div>
        <div class="stat" id="statusSize">Taille: -- px</div>

        <hr style="border-color:#333; margin: 5px 0;">

        <div style="font-size:11px; margin-bottom:5px;">
            Acuité: <span id="valAcuity">1.0</span>
            <input type="range" id="acuity" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateParams()" style="width:100%; margin:0;">
        </div>

        <button class="secondary" onclick="toggleCalib()">📏 Calibrer l'écran</button>

        <div id="calibPanel">
            <p style="font-size:11px; margin:0; color:#ddd;">Ajustez la barre rouge à <b>1 cm</b> avec une règle.</p>
            <div class="calib-bar-container">
                <div class="calib-bar" id="calibBar"></div>
            </div>
            <input type="range" id="calibSlider" min="0.5" max="2.0" step="0.05" value="1.0" oninput="updateCalib()" style="width:100%;">
            <button onclick="saveCalib()" style="background:#28a745; margin-top:5px;">Sauvegarder</button>
        </div>
    </div>

    <!-- Contrôle pour la taille des lettres -->
    <div id="letterSizeControl" style="display:none;">
        <div id="letterSizeLabel">Taille lettre (px)</div>
        <div id="letterSizeValue">80</div>
        <div class="size-control-buttons">
            <button class="size-btn secondary" onclick="adjustLetterSize(-10)">-</button>
            <input type="number" id="letterSizeInput" min="20" max="300" value="80" onchange="updateLetterSizeFromInput()">
            <button class="size-btn secondary" onclick="adjustLetterSize(10)">+</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>

    <script>
        let model = null;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        let ui = document.getElementById('ui');
        let overlay = document.getElementById('startOverlay');
        let letterSizeControl = document.getElementById('letterSizeControl');
        let letterSizeValueEl = document.getElementById('letterSizeValue');
        let letterSizeInputEl = document.getElementById('letterSizeInput');

        // Paramètres
        let acuity = 1.0;
        let screenDPI = 300;
        let calibrationFactor = 1.0;
        let letterSizePx = 80; // Taille par défaut en pixels

        // Tracking
        let lastHeadPos = null;
        let lastTime = 0;
        let speed = 0;
        let smoothedSpeed = 0; // Vitesse lissée pour l'affichage
        let distance = 50;
        let rawDistance = 50;
        let state = 'IDLE';
        let lastFlashTime = 0;
        const letters = "C D F H L N O P T U V Z".split(" ");

        // --- VARIABLES POUR LA RECONNAISSANCE VOCALE ---
        let recognition;
        let isListening = false;
        let currentLetterToRecognize = null;
        let errorsInRow = 0;

        // --- CALIBRATION ---
        function toggleCalib() {
            const panel = document.getElementById('calibPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }
        function updateCalib() {
            calibrationFactor = parseFloat(document.getElementById('calibSlider').value);
            document.getElementById('calibBar').style.transform = `scaleX(${calibrationFactor})`;
        }
        function saveCalib() {
            localStorage.setItem('avd_blazeface_calib_v3', calibrationFactor);
            document.getElementById('calibPanel').style.display = 'none';
            updateStats();
        }
        function loadCalib() {
            const saved = localStorage.getItem('avd_blazeface_calib_v3');
            if (saved) {
                calibrationFactor = parseFloat(saved);
                document.getElementById('calibSlider').value = calibrationFactor;
                updateCalib();
            }
        }

        // --- GESTION DE LA TAILLE DES LETTRES ---
        function updateLetterSizeFromInput() {
            const newSize = parseInt(letterSizeInputEl.value);
            if (!isNaN(newSize) && newSize >= 20 && newSize <= 300) {
                letterSizePx = newSize;
                updateAcuityFromSize();
                updateLetterDisplay();
                updateStats();
            }
            letterSizeInputEl.value = letterSizePx;
        }

        function adjustLetterSize(delta) {
            letterSizePx = Math.max(20, Math.min(300, letterSizePx + delta));
            letterSizeInputEl.value = letterSizePx;
            updateAcuityFromSize();
            updateLetterDisplay();
            updateStats();
        }

        function updateAcuityFromSize() {
            // Calcul de l'acuité à partir de la taille en pixels
            acuity = (distance * 0.0145 * screenDPI) / (2.54 * letterSizePx);
            acuity = Math.max(0.1, Math.min(2.0, acuity));

            // Mettre à jour l'affichage de l'acuité
            document.getElementById('acuity').value = acuity.toFixed(1);
            document.getElementById('valAcuity').innerText = acuity.toFixed(1);
        }

        function updateLetterDisplay() {
            letterSizeValueEl.innerText = letterSizePx;
        }

        // --- INITIALISATION DE LA RECONNAISSANCE VOCALE ---
        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                console.warn("Reconnaissance vocale non supportée par ce navigateur.");
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'fr-FR'; // Langue française

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.trim().toUpperCase();
                console.log("Reconnu :", transcript);
                validateLetter(transcript);
            };

            recognition.onerror = function(event) {
                console.error("Erreur de reconnaissance vocale:", event.error);
                errorsInRow++;
                if (errorsInRow >= 3) {
                    endTestWithError("3 erreurs de reconnaissance vocale.");
                } else {
                    setTimeout(startListening, 500);
                }
            };

            recognition.onend = function() {
                isListening = false;
            };
        }

        function startListening() {
            if (isListening || !recognition) return;
            recognition.start();
            isListening = true;
            console.log("Écoute vocale démarrée...");
        }

        function stopListening() {
            if (!isListening || !recognition) return;
            recognition.stop();
            isListening = false;
        }

        function validateLetter(pronouncedLetter) {
            if (!currentLetterToRecognize) return;

            if (pronouncedLetter === currentLetterToRecognize) {
                console.log("✅ Bonne réponse :", currentLetterToRecognize);
                errorsInRow = 0;
                setTimeout(() => {
                    state = 'IDLE';
                    letterEl.style.opacity = '0';
                }, 500);
            } else {
                console.log("❌ Mauvaise réponse. Attendu :", currentLetterToRecognize, "Reçu :", pronouncedLetter);
                errorsInRow++;

                if (errorsInRow >= 3) {
                    endTestWithError("3 erreurs consécutives.");
                } else {
                    setTimeout(startListening, 500);
                }
            }
        }

        function endTestWithError(message) {
            state = 'IDLE';
            stopListening();
            letterEl.style.opacity = '0';
            alert("Test terminé : " + message);
        }

        // --- DÉMARRAGE ---
        async function startApp() {
            loadCalib();
            initSpeechRecognition(); // Initialiser la reconnaissance vocale
            try {
                // On force une résolution correcte pour la stabilité
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    overlay.style.display = 'none';
                    ui.style.display = 'block';
                    letterSizeControl.style.display = 'block';
                    video.play();
                    document.getElementById('statusInit').innerText = "Chargement IA...";
                    model = await blazeface.load();
                    document.getElementById('statusInit').innerText = "Prêt !";

                    const dpr = window.devicePixelRatio || 1;
                    let baseDPI = dpr > 2 ? 450 : (dpr > 1 ? 300 : 150);
                    screenDPI = baseDPI * calibrationFactor;

                    // Initialiser la taille de la lettre
                    updateLetterDisplay();
                    loop();
                };
            } catch (err) {
                document.getElementById('errorMsg').innerText = "Erreur Caméra : " + err.message;
            }
        }

        // --- BOUCLE PRINCIPALE ---
        async function loop() {
            if (!model) return;

            const predictions = await model.estimateFaces(video, false);

            if (predictions.length > 0) {
                const face = predictions[0];
                // Landmark 2 = Nez (point le plus stable au centre)
                const nose = face.landmarks[2];
                const leftEye = face.landmarks[0];
                const rightEye = face.landmarks[1];

                // 1. DISTANCE
                const distInterYeuxPx = Math.sqrt(
                    Math.pow(rightEye[0] - leftEye[0], 2) +
                    Math.pow(rightEye[1] - leftEye[1], 2)
                );
                const K_FACTOR = 2800;
                if (distInterYeuxPx > 5) {
                    let calculatedDist = K_FACTOR / distInterYeuxPx;
                    rawDistance = calculatedDist;
                    // Lissage fort de la distance (elle ne change pas vite)
                    distance = (distance * 0.9) + (rawDistance * 0.1);
                    distance = Math.max(30, Math.min(120, distance));
                }

                // 2. VITESSE (Calcule vectoriel)
                const now = performance.now();
                if (lastHeadPos) {
                    const dt = (now - lastTime); // ms

                    if (dt > 16) { // ~60fps min
                        const dx = nose[0] - lastHeadPos.x;
                        const dy = nose[1] - lastHeadPos.y;
                        const distPx = Math.sqrt(dx*dx + dy*dy);

                        // Vitesse brute en px/ms
                        let rawSpeed = distPx / dt;

                        // Lissage de la vitesse (Réaction rapide mais sans pics)
                        smoothedSpeed = (smoothedSpeed * 0.7) + (rawSpeed * 0.3);

                        // Conversion arbitraire pour l'affichage
                        speed = smoothedSpeed * 1000;
                    }
                }
                lastHeadPos = { x: nose[0], y: nose[1] };
                lastTime = now;

                handleState(speed, now);
                updateStats();

            } else {
                // Decay speed si pas de visage
                smoothedSpeed = smoothedSpeed * 0.9;
                speed = smoothedSpeed * 1000;
                updateStats();
            }
            requestAnimationFrame(loop);
        }

        // --- MACHINE D'ÉTAT (MODIFIÉE POUR LA RECONNAISSANCE VOCALE) ---
        function handleState(currentSpeed, now) {
            const minSpeedTrigger = 150;
            const flashDuration = 60;
            const cooldownDuration = 1000;

            if (state === 'IDLE') {
                if (currentSpeed > minSpeedTrigger && (now - lastFlashTime > cooldownDuration)) {
                    state = 'FLASH';
                    lastFlashTime = now;

                    const randomLetter = letters[Math.floor(Math.random() * letters.length)];
                    currentLetterToRecognize = randomLetter;
                    letterEl.innerText = randomLetter;
                    letterEl.style.fontSize = letterSizePx + 'px';
                    letterEl.style.opacity = '1';

                    console.log("Lettre affichée :", randomLetter, " - Veuillez la prononcer.");

                    // Démarrer l'écoute vocale après un court délai
                    setTimeout(startListening, 300);

                    // Ne pas masquer la lettre tant que la validation vocale n'est pas correcte
                    setTimeout(() => {
                        // La lettre reste visible jusqu'à validation correcte
                    }, flashDuration);
                }
            }
        }

        // --- CALCUL TAILLE OPTIQUE ---
        function calculateSize(distCm, acuityDecimal) {
            let heightCm = (distCm * 0.0145) / acuityDecimal;
            let heightPx = (heightCm / 2.54) * screenDPI;
            return Math.max(20, Math.round(heightPx));
        }

        function updateParams() {
            acuity = parseFloat(document.getElementById('acuity').value);
            document.getElementById('valAcuity').innerText = acuity.toFixed(1);

            // Mettre à jour la taille en pixels en fonction de l'acuité
            letterSizePx = Math.round(calculateSize(distance, acuity));
            updateLetterDisplay();
            letterSizeInputEl.value = letterSizePx;
        }

        function updateStats() {
            document.getElementById('statusSpeed').innerText = `Vitesse: ${Math.round(speed)}`;
            document.getElementById('statusDist').innerText = `Dist: ~${Math.round(distance)} cm`;

            // Taille de la lettre courante
            document.getElementById('statusSize').innerText = `Taille: ${letterSizePx} px`;

            // Mise à jour de la jauge
            let pct = Math.min(100, (speed / 250) * 100);
            document.getElementById('speedBar').style.width = `${pct}%`;

            // Couleur de la jauge change si seuil atteint
            const bar = document.getElementById('speedBar');
            if(speed > 150) bar.style.background = '#f00';
            else bar.style.background = 'linear-gradient(90deg, #0f0, #ff0, #f00)';
        }
    </script>
</body>
</html>
