<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée avec Clavier</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.2; z-index: 1; transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px; font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            text-shadow: 0 0 10px black;
        }
        #ui {
            position: absolute; top: 10px; left: 10px; z-index: 20;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            max-width: 300px;
        }
        .stat { font-size: 12px; margin: 2px 0; color: #0f0; font-family: monospace; }
        .error { color: #f55; }

        /* Clavier virtuel */
        #keyboard {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px; z-index: 20;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
        }
        .key {
            width: 40px; height: 40px; background: #222; color: white;
            border: 1px solid #444; border-radius: 5px;
            font-size: 18px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none;
        }
        .key:hover { background: #444; }
        .key:active, .key.active { background: #0f0; color: black; }
        
        #startOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #startOverlay h1 { color: #0f0; font-size: 32px; margin-bottom: 20px; }
        #startOverlay p { color: #ccc; max-width: 400px; text-align: center; margin: 10px; }
        #startBtn {
            background: #0f0; color: black; border: none; padding: 15px 40px;
            font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer;
            margin-top: 20px;
        }
        #startBtn:hover { background: #0c0; }

        /* Contrôles */
        #controls {
            position: absolute; top: 10px; right: 10px; z-index: 20;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            display: flex; gap: 10px; align-items: center;
        }
        #controls button {
            background: #333; color: white; border: 1px solid #555;
            padding: 5px 10px; border-radius: 4px; cursor: pointer;
        }
        #controls button:hover { background: #555; }
        #letterSizeInput {
            width: 60px; padding: 5px; background: #222; color: white;
            border: 1px solid #444; border-radius: 4px; text-align: center;
        }
        
        /* Mode debug */
        #debugBox {
            position: absolute; bottom: 10px; left: 10px; z-index: 20;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            font-family: monospace; font-size: 11px; color: #888; max-width: 250px;
        }
        
        @media (max-width: 600px) {
            .key { width: 30px; height: 30px; font-size: 14px; }
            #keyboard { gap: 3px; padding: 10px; }
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="letterDisplay">A</div>
    
    <div id="ui">
        <div class="stat">Acuité: <span id="acuityDisplay">1.0</span></div>
        <div class="stat">Distance: <span id="distanceDisplay">--</span> cm</div>
        <div class="stat">Erreurs: <span id="errorDisplay">0</span></div>
        <div class="stat">Temps: <span id="timeDisplay">0.0</span>s</div>
        <div class="stat">Taille: <span id="sizeDisplay">100</span>px</div>
    </div>
    
    <div id="controls">
        <span>Taille:</span>
        <button id="decreaseBtn">-</button>
        <input type="number" id="letterSizeInput" value="100" min="10" max="500">
        <button id="increaseBtn">+</button>
    </div>
    
    <div id="keyboard"></div>
    <div id="debugBox"></div>
    
    <div id="startOverlay">
        <h1>Test d'Acuité Visuelle</h1>
        <p>Ce test mesure votre acuité visuelle en détection dynamique.</p>
        <p>Placez-vous à environ 50-60cm de l'écran.</p>
        <p>Quand une lettre apparaît, cliquez sur le clavier virtuel correspondant.</p>
        <button id="startBtn">Démarrer le Test</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        const video = document.getElementById('video');
        const letterDisplay = document.getElementById('letterDisplay');
        const acuityDisplay = document.getElementById('acuityDisplay');
        const distanceDisplay = document.getElementById('distanceDisplay');
        const errorDisplay = document.getElementById('errorDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const sizeDisplay = document.getElementById('sizeDisplay');
        const letterSizeInput = document.getElementById('letterSizeInput');
        const debugBox = document.getElementById('debugBox');
        
        // État global
        let isRunning = false;
        let currentLetter = '';
        let errors = 0;
        let correctAnswers = 0;
        let startTime = null;
        let lastFaceData = null;
        let letterSize = 100;
        let faceMesh = null;
        let camera = null;
        
        // Configuration lettres
        const letters = 'ECDFZPOTHXKYVUBA';
        const defaultSize = 100;
        const minSize = 20;
        const maxSize = 500;
        
        // Initialisation clavier
        const keyboard = document.getElementById('keyboard');
        for (let i = 0; i < letters.length; i++) {
            const key = document.createElement('div');
            key.className = 'key';
            key.textContent = letters[i];
            key.onclick = () => handleKeyPress(letters[i]);
            keyboard.appendChild(key);
        }
        
        // Ajustement grille clavier selon écran
        function adjustKeyboardGrid() {
            const width = window.innerWidth;
            if (width < 500) {
                keyboard.style.gridTemplateColumns = 'repeat(8, 1fr)';
            } else {
                keyboard.style.gridTemplateColumns = 'repeat(10, 1fr)';
            }
        }
        window.addEventListener('resize', adjustKeyboardGrid);
        adjustKeyboardGrid();
        
        // Gestion touches clavier physique
        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (letters.includes(key)) {
                handleKeyPress(key);
                document.querySelectorAll('.key').forEach(k => {
                    if (k.textContent === key) k.classList.add('active');
                });
            }
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toUpperCase();
            document.querySelectorAll('.key').forEach(k => {
                if (k.textContent === key) k.classList.remove('active');
            });
        });
        
        // Contrôles manuels
        document.getElementById('increaseBtn').onclick = () => {
            letterSize = Math.min(maxSize, letterSize + 10);
            letterSizeInput.value = letterSize;
            updateAcuityFromSize();
            showLetter();
        };
        
        document.getElementById('decreaseBtn').onclick = () => {
            letterSize = Math.max(minSize, letterSize - 10);
            letterSizeInput.value = letterSize;
            updateAcuityFromSize();
            showLetter();
        };
        
        letterSizeInput.addEventListener('change', (e) => {
            letterSize = Math.max(minSize, Math.min(maxSize, parseInt(e.target.value) || defaultSize));
            e.target.value = letterSize;
            updateAcuityFromSize();
            showLetter();
        });
        
        // Gestion réponse utilisateur
        function handleKeyPress(key) {
            if (!isRunning || !currentLetter) return;
            
            const now = Date.now();
            
            if (key === currentLetter) {
                // Correct
                correctAnswers++;
                
                // Diminuer taille (rendre plus difficile)
                if (letterSize > minSize) {
                    letterSize = Math.max(minSize, letterSize - 10);
                    letterSizeInput.value = letterSize;
                }
            } else {
                // Erreur
                errors++;
                errorDisplay.textContent = errors;
                
                // Augmenter taille (rendre plus facile)
                if (letterSize < maxSize) {
                    letterSize = Math.min(maxSize, letterSize + 10);
                    letterSizeInput.value = letterSize;
                }
            }
            
            updateAcuityFromSize();
            showLetter();
            
            // Mise à jour temps
            if (startTime) {
                const elapsed = (now - startTime) / 1000;
                timeDisplay.textContent = elapsed.toFixed(1);
            }
            
            // Log debug
            debugBox.innerHTML = `Dernière: ${key} ${key === currentLetter ? '✓' : '✗'} | Size: ${letterSize}px | Acuity: ${acuityDisplay.textContent}`;
        }
        
        // Mise à jour acuité depuis taille lettre (SANS distance)
        function updateAcuityFromSize() {
            // Calcul acuité uniquement depuis la taille de la lettre
            const screenDPI = window.screen.width / (window.screen.widthInches || 10);
            const sizeInches = letterSize / screenDPI;
            // Acuité = 1 / (angle visuel en minutes d'arc)
            // Pour un optotype standard (5x5), la hauteur correspond à 5 minutes d'arc à 1 minute
            const acuity = 1 / (sizeInches * 2.9); // Approximation
            acuityDisplay.textContent = Math.max(0.1, Math.min(2.0, acuity)).toFixed(2);
            sizeDisplay.textContent = letterSize;
        }
        
        // Affichage lettre
        function showLetter() {
            currentLetter = letters[Math.floor(Math.random() * letters.length)];
            letterDisplay.textContent = currentLetter;
            letterDisplay.style.fontSize = letterSize + 'px';
            letterDisplay.style.opacity = 1;
            
            // Masquer après délai court
            setTimeout(() => {
                letterDisplay.style.opacity = 0;
                currentLetter = '';
            }, 1500);
        }
        
        // Initialisation FaceMesh
        async function initFaceMesh() {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });
            
            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            faceMesh.onResults(onFaceMeshResults);
            
            camera = new Camera(video, {
                onFrame: async () => {
                    if (faceMesh && isRunning) {
                        await faceMesh.send({ image: video });
                    }
                },
                width: 640,
                height: 480
            });
            
            await camera.start();
        }
        
        // Traitement résultats FaceMesh
        function onFaceMeshResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                
                // Calcul distance (affichée mais PLUS utilisée pour adaptation)
                const nose = landmarks[1];
                const leftEye = landmarks[33];
                const rightEye = landmarks[263];
                
                const eyeDistancePx = Math.hypot(
                    (leftEye.x - rightEye.x) * video.videoWidth,
                    (leftEye.y - rightEye.y) * video.videoHeight
                );
                
                // Distance approx: 5.5cm = distance inter-pupillaire moyenne
                // 63.7 = constante proportionnelle pour écran standard
                const distance = Math.round(63.7 / eyeDistancePx * 100);
                
                // Affichage distance (pour info uniquement)
                if (distance > 20 && distance < 200) {
                    distanceDisplay.textContent = distance;
                }
                
                lastFaceData = { distance, eyeDistancePx };
            }
        }
        
        // Mise à jour paramètres (simplifiée - plus de calculateSize)
        function updateParams() {
            // La distance est calculée et affichée dans loop() mais n'est plus utilisée ici
            updateAcuityFromSize();
        }
        
        // Boucle principale
        function loop() {
            if (isRunning) {
                updateParams();
                
                // Si pas de lettre affichée et assez de temps passé, en afficher une
                if (!currentLetter && Math.random() < 0.02) {
                    showLetter();
                }
            }
            requestAnimationFrame(loop);
        }
        
        // Démarrage
        document.getElementById('startBtn').onclick = async () => {
            document.getElementById('startOverlay').style.display = 'none';
            
            try {
                await initFaceMesh();
                isRunning = true;
                startTime = Date.now();
                letterSize = defaultSize;
                letterSizeInput.value = letterSize;
                updateAcuityFromSize();
                loop();
                
                // Afficher première lettre
                setTimeout(showLetter, 1000);
            } catch (err) {
                console.error('Erreur:', err);
                alert('Erreur caméra: ' + err.message);
            }
        };
        
        // Initialisation acuité
        letterSize = defaultSize;
        updateAcuityFromSize();
    </script>

</body>
</html>
