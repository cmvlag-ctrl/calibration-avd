<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Version Initiale</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            z-index: 1;
            transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px black;
            max-width: 90vw;
            text-align: center;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            max-width: 300px;
        }
        .stat {
            font-size: 12px;
            margin: 2px 0;
            color: #0f0;
            font-family: monospace;
        }
        .error {
            color: #f55;
        }
        button {
            background: #4ecdc4;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 5px;
        }
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        #startMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #4ecdc4;
            opacity: 0;
            z-index: 20;
            text-shadow: 0 0 10px #4ecdc4;
            transition: opacity 0.3s;
        }

        /* CLavier virtuel - VERSION ORIGINALE COMPACTE */
        #keyboard {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            width: 90%;
            max-width: 450px;
        }
        .key {
            width: 50px;
            height: 50px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .key:hover {
            background: #555;
        }
        .key.validated {
            background: #28a745;
        }
        .key.invalid {
            background: #dc3545;
        }
        #scoreTopPanel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            background: rgba(0,0,0,0.8);
            padding: 8px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="startOverlay">
        <h1>Test Acuité (Pro)</h1>
        <p>Détection de vitesse optimisée.</p>
        <button onclick="startApp()">DÉMARRER</button>
        <p id="errorMsg" class="error"></p>
    </div>
    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay">A</div>
    <div id="startMessage">Début</div>

    <div id="ui" style="display:none;">
        <div class="stat" id="statusInit">Initialisation...</div>
        <div class="stat" id="statusSpeed">Vitesse: 0</div>
        <div class="stat" id="statusDist">Distance: -- cm</div>
        <div class="stat" id="statusSize">Taille: -- px</div>
        <hr style="border-color:#333; margin: 5px 0;">
    </div>

    <div id="scoreTopPanel">Score: --% | Min: -- px</div>

    <!-- Clavier virtuel - VERSION ORIGINALE COMPACTE -->
    <div id="keyboard">
        <!-- Clavier généré par JavaScript -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
    <script>
        // --- VARIABLES GLOBALES ---
        let model;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        let startOverlay = document.getElementById('startOverlay');
        let ui = document.getElementById('ui');
        let startMessage = document.getElementById('startMessage');
        let keyboard = document.getElementById('keyboard');
        let scoreTopPanel = document.getElementById('scoreTopPanel');

        // Statistiques
        let totalLetters = 0;
        let correctLetters = 0;
        let minSuccessfulLetterSize = Infinity;

        // État du test
        let state = 'IDLE';
        let lastFlashTime = 0;
        let flashTimeout = null;
        let currentDisplayedLetter = '';

        // Paramètres de mouvement
        let distance = 60;
        let speed = 0;
        let lastHeadPos = {x: 0, y: 0};

        // Liste des lettres
        const letters = "D F P V A N L C O E R U S Z H".split(" ");

        // --- INITIALISATION DU CLAVIER ---
        function initKeyboard() {
            keyboard.innerHTML = '';
            const lettersSorted = [...letters].sort();
            lettersSorted.forEach(letter => {
                const key = document.createElement('button');
                key.className = 'key';
                key.innerText = letter;
                key.onclick = () => validateLetter(letter);
                keyboard.appendChild(key);
            });
        }

        // --- DÉMARRAGE DE L'APPLI ---
        async function startApp() {
            try {
                document.getElementById('errorMsg').textContent = '';
                startOverlay.style.opacity = '0';
                startOverlay.style.pointerEvents = 'none';

                // Initialisation du modèle IA
                document.getElementById('statusInit').textContent = 'Chargement du modèle IA...';
                model = await blazeface.load();
                document.getElementById('statusInit').textContent = 'Modèle IA chargé ✓';

                // Accès à la caméra
                document.getElementById('statusInit').textContent = 'Accès à la caméra...';
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                video.srcObject = stream;
                await new Promise(resolve => video.onloadedmetadata = resolve);
                document.getElementById('statusInit').textContent = 'Caméra prête ✓';

                // Masquer le message de démarrage
                startMessage.style.opacity = '1';
                setTimeout(() => startMessage.style.opacity = '0', 1000);

                // Afficher l'UI
                ui.style.display = 'block';

                // Initialiser le clavier
                initKeyboard();

                // Lancer la détection de mouvement
                state = 'WAITING_MOVEMENT';
                detectMovement();

            } catch(err) {
                console.error(err);
                document.getElementById('errorMsg').textContent = 'Erreur: ' + err.message;
                startOverlay.style.opacity = '1';
                startOverlay.style.pointerEvents = 'auto';
            }
        }

        // --- DÉTECTION DE MOUVEMENT ---
        async function detectMovement() {
            if(state !== 'WAITING_MOVEMENT') return;

            try {
                const predictions = await model.estimateFaces(video, false);
                if(predictions.length > 0) {
                    const pred = predictions[0];
                    const box = pred.box;
                    const newHeadPos = {x: box[0] + box[2]/2, y: box[1] + box[3]/2};

                    if(lastHeadPos.x !== 0 && lastHeadPos.y !== 0) {
                        const dx = newHeadPos.x - lastHeadPos.x;
                        const dy = newHeadPos.y - lastHeadPos.y;

                        // Calcul de la distance en pixels
                        const pixelDistance = Math.sqrt(dx*dx + dy*dy);
                        distance = pixelDistance;

                        // Calcul de la vitesse
                        speed = distance * 100; // Conversion en vitesse

                        // Affichage des stats
                        document.getElementById('statusSpeed').innerText = `Vitesse: ${Math.round(speed)}`;
                        document.getElementById('statusDist').innerText = `Distance: ~${Math.round(distance)} px`;
                    }

                    lastHeadPos = newHeadPos;

                    // Si mouvement détecté, afficher une lettre (60ms comme demandé)
                    if(speed > 200 && state === 'WAITING_MOVEMENT') {
                        state = 'WAITING_VALIDATION';
                        showLetter();
                    }
                } else {
                    // Visage non détecté
                    lastHeadPos = {x: 0, y: 0};
                    if(state === 'WAITING_VALIDATION') {
                        state = 'WAITING_MOVEMENT';
                    }
                }
            } catch(err) {
                console.error('Erreur détection:', err);
            }

            requestAnimationFrame(detectMovement);
        }

        // --- AFFICHAGE D'UNE LETTRE (60ms comme demandé) ---
        function showLetter() {
            if(state !== 'WAITING_VALIDATION') return;

            const now = Date.now();
            if(now - lastFlashTime < 60) return;

            totalLetters++;
            lastFlashTime = now;
            currentDisplayedLetter = letters[Math.floor(Math.random() * letters.length)];
            letterEl.innerText = currentDisplayedLetter;
            letterEl.style.opacity = '1';

            // Taille de la lettre basée sur la vitesse
            const letterSize = Math.max(20, 200 - Math.min(150, speed / 2));
            letterEl.style.fontSize = `${letterSize}px`;

            clearTimeout(flashTimeout);
            flashTimeout = setTimeout(() => {
                if(state === 'WAITING_VALIDATION') {
                    letterEl.style.opacity = '0';
                    state = 'WAITING_MOVEMENT';
                }
            }, 60);
        }

        // --- VALIDATION D'UNE LETTRE ---
        function validateLetter(clickedLetter) {
            if(state !== 'WAITING_VALIDATION') return;

            clearTimeout(flashTimeout);
            letterEl.style.opacity = '0';

            const isCorrect = clickedLetter === currentDisplayedLetter;
            if(isCorrect) {
                correctLetters++;
                minSuccessfulLetterSize = Math.min(minSuccessfulLetterSize, parseFloat(letterEl.style.fontSize));
            }

            // Mise à jour de l'affichage
            const successRate = totalLetters > 0 ? Math.round((correctLetters / totalLetters) * 100) : 0;
            scoreTopPanel.innerHTML = `Score: ${successRate}% | Min: ${minSuccessfulLetterSize !== Infinity ? minSuccessfulLetterSize : '--'} px`;

            state = 'WAITING_MOVEMENT';
        }
    </script>
</body>
</html>
