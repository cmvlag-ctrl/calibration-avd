<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Précision Optométrique</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; user-select: none; -webkit-user-select: none; touch-action: none; }
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.2; z-index: 1; transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            will-change: opacity, font-size;
        }

        /* UI */
        #toggleSettings {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; width: 40px; height: 40px; border-radius: 50%;
            font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        #settingsPanel {
            position: absolute; top: 65px; left: 15px; z-index: 99;
            background: rgba(0,0,0,0.95); padding: 20px; border-radius: 12px;
            width: 280px; border: 1px solid #444;
            transform: translateX(-150%); transition: transform 0.3s ease-out;
        }
        #settingsPanel.open { transform: translateX(0); }
        
        .control-group { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: #ccc; }
        .val-blue { color: #00d2ff; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: #00d2ff; }
        
        button.btn {
            background: #333; border: 1px solid #555; color: white; padding: 10px; 
            border-radius: 6px; width: 100%; cursor: pointer; margin-top: 5px; font-size: 13px;
        }
        button.btn-primary { background: #00d2ff; color: #000; border: none; font-weight: bold; }

        #calibContainer { 
            display: none; margin-top: 10px; padding: 10px; background: #111; border-radius: 8px; border: 1px dashed #444; 
        }
        .calib-visual {
            height: 50px; background: #222; margin: 10px 0; position: relative;
            display: flex; align-items: center; justify-content: center; border: 1px solid #333;
        }
        .calib-bar { height: 100%; background: #ff4444; width: 50px; transition: width 0.1s; }

        #statsBar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; font-size: 14px; color: #888; z-index: 50;
            background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 20px; border: 1px solid #333;
        }
        .stat-real-size { color: #00d2ff; }

        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
</head>
<body>

    <div id="startOverlay">
        <h2 style="color:white; margin-bottom:20px;">TEST ACUITÉ VISUELLE</h2>
        <p style="color:#aaa; margin-bottom:30px; max-width:300px; text-align:center;">
            Pour une taille précise, utilisez le bouton <b>Calibrer</b> avec une règle.
        </p>
        <button class="btn btn-primary" style="width:auto; padding:15px 40px; font-size:18px;" onclick="startApp()">LANCER</button>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay">E</div>

    <div id="toggleSettings" onclick="toggleSettings()">⚙️</div>

    <div id="settingsPanel">
        <div style="font-weight:bold; color:#00d2ff; margin-bottom:15px;">PARAMÈTRES</div>

        <div class="control-group">
            <div class="label-row"><span>Acuité (1/10)</span> <span id="acuityVal" class="val-blue">1.0</span></div>
            <input type="range" id="acuityRange" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateAcuity()">
        </div>

        <button class="btn" onclick="toggleCalib()">📏 Calibrer l'écran (Règle)</button>
        
        <div id="calibContainer">
            <p style="font-size:11px; color:#aaa; margin:0 0 10px 0; text-align:center;">
                Ajustez la barre pour qu'elle mesure <b>EXACTEMENT 1 CM</b> avec une vraie règle.
            </p>
            <div class="calib-visual">
                <div class="calib-bar" id="calibBar" style="width: 50px;"></div>
            </div>
            <input type="range" id="calibRange" min="20" max="150" step="1" value="50" oninput="updateCalibPreview()">
            <button class="btn btn-primary" onclick="saveCalib()">VALIDER</button>
        </div>
    </div>

    <div id="statsBar">
        <div>Vitesse: <b id="dispSpeed">0</b> °/s</div>
        <div>Distance: <b id="dispDist">50</b> cm</div>
        <div class="stat-real-size">Taille: <b id="dispSizeMm">--</b> mm</div>
    </div>

    <script>
        let model, video, letterEl;
        let acuity = 1.0;
        let distance = 50;
        let pixelsPerCm = 56; // Valeur par défaut (estimation moyenne)
        let state = 'IDLE';
        let lastFlash = 0;
        let lastPos = null;
        let lastTime = 0;
        let letters = ["H", "X", "O", "V", "U", "Z", "C", "E", "N", "R"];

        // 1. INITIALISATION
        function startApp() {
            loadCalib();
            document.getElementById('startOverlay').style.display = 'none';
            initCamera();
        }

        function initCamera() {
            video = document.getElementById('video');
            letterEl = document.getElementById('letterDisplay');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } })
            .then(stream => {
                video.srcObject = stream;
                return video.play();
            })
            .then(() => blazeface.load())
            .then(loadedModel => {
                model = loadedModel;
                requestAnimationFrame(processFrame);
            })
            .catch(err => alert("Erreur: " + err));
        }

        // 2. LOGIQUE CALIBRAGE
        function toggleCalib() {
            const c = document.getElementById('calibContainer');
            c.style.display = (c.style.display === 'block') ? 'none' : 'block';
        }
        function updateCalibPreview() {
            pixelsPerCm = parseInt(document.getElementById('calibRange').value);
            document.getElementById('calibBar').style.width = pixelsPerCm + 'px';
        }
        function saveCalib() {
            localStorage.setItem('avd_ppc', pixelsPerCm);
            toggleCalib();
            toggleSettings(); // Ferme le menu
            alert("Calibrage enregistré !");
        }
        function loadCalib() {
            const saved = localStorage.getItem('avd_ppc');
            if (saved) {
                pixelsPerCm = parseInt(saved);
                document.getElementById('calibRange').value = pixelsPerCm;
                document.getElementById('calibBar').style.width = pixelsPerCm + 'px';
            }
        }

        // 3. UI & MATHS
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }
        function updateAcuity() {
            acuity = parseFloat(document.getElementById('acuityRange').value);
            document.getElementById('acuityVal').innerText = acuity.toFixed(1);
        }

        function calculateLetterSize(distCm) {
            // Formule Optométrique : Taille (mm) = (Distance (mm) * tan(5')) / Acuité
            // tan(5 min d'arc) ≈ 0.0014544
            // Taille (cm) = Dist (cm) * 0.0014544 / Acuité
            
            const sizeCm = (distCm * 0.0014544) / acuity;
            
            // Conversion en Pixels : Taille(cm) * (Pixels / cm)
            const sizePx = sizeCm * pixelsPerCm;
            
            // Mise à jour affichage mm pour vérification
            document.getElementById('dispSizeMm').innerText = (sizeCm * 10).toFixed(1);
            
            return Math.round(sizePx);
        }

        // 4. BOUCLE PRINCIPALE
        async function processFrame() {
            if (!model) return;

            const predictions = await model.estimateFaces(video, false);
            
            if (predictions.length > 0) {
                const face = predictions[0];
                const landmarks = face.landmarks;
                
                // 0 = Oeil Gauche, 1 = Oeil Droit (sur Blazeface standard)
                // Note: L'image est miroir (css transform), mais les coords sont brutes
                const leftEye = landmarks[0]; 
                const rightEye = landmarks[1];
                
                // Distance inter-oculaire moyenne adult: 6.3cm
                const distPx = Math.hypot(rightEye[0] - leftEye[0], rightEye[1] - leftEye[1]);
                distance = (6.3 / distPx) * window.innerWidth; // Estimation distance écran
                
                document.getElementById('dispDist').innerText = Math.round(distance);
                document.getElementById('dispSizeMm').innerText = 
                    ((distance * 0.0014544 / acuity) * 10).toFixed(1);

                // Détection Mouvement (Vitesse)
                const nose = landmarks[2]; 
                const now = performance.now();
                
                if (lastPos) {
                    const dt = now - lastTime;
                    if (dt > 0) {
                        const dPx = Math.hypot(nose[0] - lastPos.x, nose[1] - lastPos.y);
                        const vPxSec = (dPx / dt) * 1000;
                        
                        // Conversion approx Pixels/seconde -> Degrés/seconde
                        // Hypothèse FOV ~ 60° sur largeur écran
                        const degPerPx = 60 / video.videoWidth; 
                        const speed = vPxSec * degPerPx;
                        
                        document.getElementById('dispSpeed').innerText = Math.round(speed);

                        // Déclenchement
                        if (state === 'IDLE' && speed > 150 && (now - lastFlash > 1000)) {
                            triggerFlash();
                            lastFlash = now;
                        }
                    }
                }
                lastPos = { x: nose[0], y: nose[1] };
                lastTime = now;
            }

            requestAnimationFrame(processFrame);
        }

        function triggerFlash() {
            state = 'FLASH';
            const letter = letters[Math.floor(Math.random() * letters.length)];
            const sizePx = calculateLetterSize(distance);
            
            letterEl.innerText = letter;
            letterEl.style.fontSize = sizePx + 'px';
            letterEl.style.opacity = '1';

            setTimeout(() => {
                letterEl.style.opacity = '0';
                state = 'IDLE';
            }, 60);
        }
    </script>
</body>
</html>
