<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée avec Clavier</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            user-select: none;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }

        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px black;
            transition: opacity 0.1s;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            max-width: 300px;
        }

        .stat {
            font-size: 12px;
            margin: 2px 0;
            color: #0f0;
            font-family: monospace;
        }

        .error {
            color: #f55;
        }

        /* Jauge de vitesse */
        .speed-gauge {
            height: 6px;
            background: #333;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }

        .speed-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s linear;
        }

        /* Clavier virtuel */
        #keyboard {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: rgba(0,0,0,0.85);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            width: 90%;
            max-width: 500px;
            min-height: 50px;
        }

        .key {
            background: #4ecdc4;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            min-width: 30px;
            transition: background 0.2s;
        }

        .key:hover {
            background: #55e0d6;
        }

        .key.correct {
            background: #0f0;
            animation: pulse 0.5s;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Message d'attente */
        #waitingMessage {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffc107;
            font-size: 14px;
            font-weight: bold;
            z-index: 32;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 4px;
            text-align: center;
        }

        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        #calibPanel {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
            text-align: center;
        }

        .calib-bar-container {
            height: 20px;
            border: 1px dashed #666;
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 12mm;
        }

        .calib-bar {
            height: 100%;
            width: 0%;
            background: #4ecdc4;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <video id="video" autoplay></video>

    <div id="letterDisplay"></div>

    <div id="ui">
        <div class="stat">Vitesse: <span id="statusSpeed">0</span></div>
        <div class="stat">Dist: ~<span id="statusDist">0</span> cm</div>
        <div class="stat">Taille: <span id="statusSize">0</span> px</div>
        <div class="stat">Acuité: <span id="valAcuity">1.0</span></div>
        <div class="speed-gauge">
            <div class="speed-bar" id="speedBar"></div>
        </div>
        <div id="calibPanel">
            <div>Calibration - Distance: <span id="calibDist">100</span> cm</div>
            <div class="calib-bar-container">
                <div class="calib-bar" id="calibBar"></div>
            </div>
        </div>
        <button id="toggleCalib" class="secondary">Activer calibration</button>
        <button id="startTest">Démarrer le test</button>
    </div>

    <div id="keyboard" style="display:none;">
        <!-- Les touches seront générées par JavaScript -->
    </div>

    <div id="waitingMessage" style="display:none;">⏳ Validez la lettre affichée pour continuer</div>

    <div id="startOverlay">
        <h1>Test d'Acuité Visuelle</h1>
        <p>Tournez la tête pour afficher une lettre</p>
        <p>Cliquez sur la lettre correcte pour valider</p>
        <button id="startBtn">Commencer</button>
    </div>

    <script>
        // Variables globales
        let flashTimeout = null;
        const flashDuration = 60; // 60ms fixes
        let currentLetter = '';
        let state = 'IDLE'; // IDLE ou WAITING_VALIDATION
        let speed = 0;
        let distance = 100;
        let acuity = 1.0;
        let letterSizePx = 100;
        let screenDPI = 96;
        let headMovementThreshold = 20;
        let lastHeadPosition = { x: 0, y: 0 };
        let video = document.getElementById('video');
        let letterDisplay = document.getElementById('letterDisplay');
        let keyboard = document.getElementById('keyboard');
        let waitingMessage = document.getElementById('waitingMessage');
        let startOverlay = document.getElementById('startOverlay');
        let startBtn = document.getElementById('startBtn');
        let startTestBtn = document.getElementById('startTest');
        let toggleCalibBtn = document.getElementById('toggleCalib');
        let calibPanel = document.getElementById('calibPanel');
        let calibDistEl = document.getElementById('calibDist');
        let calibBar = document.getElementById('calibBar');
        let acuityEl = document.getElementById('acuity');

        // Lettres possibles
        const letters = ['E', 'B', 'D', 'H', 'K', 'N', 'R', 'U', 'V', 'Z'];

        // Initialisation
        startBtn.addEventListener('click', startTest);
        startTestBtn.addEventListener('click', startTest);
        toggleCalibBtn.addEventListener('click', toggleCalibration);

        // Génération du clavier
        function generateKeyboard() {
            keyboard.innerHTML = '';
            letters.forEach(letter => {
                const button = document.createElement('button');
                button.className = 'key';
                button.textContent = letter;
                button.addEventListener('click', () => validateLetter(letter));
                keyboard.appendChild(button);
            });
        }

        // Démarrage du test
        function startTest() {
            startOverlay.style.display = 'none';
            generateKeyboard();
            keyboard.style.display = 'flex';
            waitingMessage.style.display = 'block';
            state = 'IDLE';
            updateLetterDisplay();
        }

        // Basculer la calibration
        function toggleCalibration() {
            calibPanel.style.display = calibPanel.style.display === 'none' ? 'block' : 'none';
        }

        // Mise à jour de l'affichage de la lettre
        function updateLetterDisplay() {
            if (state === 'IDLE') {
                letterDisplay.style.opacity = '0';
            }
        }

        // Afficher une nouvelle lettre
        function showNewLetter() {
            if (state !== 'IDLE') return;

            // Générer une lettre aléatoire
            const randomIndex = Math.floor(Math.random() * letters.length);
            currentLetter = letters[randomIndex];

            // Afficher la lettre
            letterDisplay.textContent = currentLetter;
            letterDisplay.style.opacity = '1';

            // Planifier la disparition après 60ms
            flashTimeout = setTimeout(() => {
                if (state === 'WAITING_VALIDATION') {
                    // La lettre disparaît après 60ms si non validée
                    letterDisplay.style.opacity = '0';
                }
            }, flashDuration);

            // Passer en état d'attente de validation
            state = 'WAITING_VALIDATION';
            waitingMessage.style.display = 'block';
        }

        // Validation de la lettre
        function validateLetter(selectedLetter) {
            if (state !== 'WAITING_VALIDATION') return;

            // Annuler le timeout de disparition
            if (flashTimeout) {
                clearTimeout(flashTimeout);
                flashTimeout = null;
            }

            // Vérifier si la lettre est correcte
            if (selectedLetter === currentLetter) {
                // Réussite - la lettre devient verte et pulse
                letterDisplay.classList.add('key', 'correct');
                setTimeout(() => {
                    letterDisplay.style.opacity = '0';
                    letterDisplay.classList.remove('key', 'correct');
                }, 500);
            } else {
                // Échec - la lettre disparaît immédiatement
                letterDisplay.style.opacity = '0';
            }

            // Retour à l'état IDLE
            state = 'IDLE';
            waitingMessage.style.display = 'none';

            // Attendre un peu avant de montrer la prochaine lettre
            setTimeout(showNewLetter, 500);
        }

        // Détection de mouvement de tête (simplifiée)
        function detectHeadMovement() {
            if (state !== 'IDLE') return;

            // Cette fonction serait remplacée par une vraie détection faciale
            // Pour l'instant, on simule avec un mouvement aléatoire
            if (Math.random() > 0.95) {
                showNewLetter();
            }
        }

        // Simulation de détection faciale (à remplacer par votre système réel)
        setInterval(detectHeadMovement, 100);

        // Mise à jour des paramètres
        function updateParams() {
            acuity = parseFloat(acuityEl.value);
            document.getElementById('valAcuity').innerText = acuity.toFixed(1);
            letterSizePx = Math.round(calculateSize(distance, acuity));
            updateLetterDisplay();
        }

        // Calcul de la taille de la lettre
        function calculateSize(distCm, acuityDecimal) {
            let heightCm = (distCm * 0.0145) / acuityDecimal;
            let heightPx = (heightCm / 2.54) * screenDPI;
            return Math.max(20, Math.round(heightPx));
        }

        // Mise à jour des statistiques
        function updateStats() {
            document.getElementById('statusSpeed').innerText = Math.round(speed);
            document.getElementById('statusDist').innerText = Math.round(distance);
            document.getElementById('statusSize').innerText = letterSizePx;

            let pct = Math.min(100, (speed / 250) * 100);
            document.getElementById('speedBar').style.width = `${pct}%`;

            const bar = document.getElementById('speedBar');
            if(speed > 150) bar.style.background = '#f00';
            else bar.style.background = 'linear-gradient(90deg, #0f0, #ff0, #f00)';
        }

        // Animation principale
        function animate() {
            detectHeadMovement();
            updateStats();
            requestAnimationFrame(animate);
        }

        // Démarrer l'animation
        animate();
    </script>
</body>
</html>
