<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection RALP/LATERAL/LARP (VHIT)</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }

        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px black;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            max-width: 300px;
        }

        .stat {
            font-size: 12px;
            margin: 2px 0;
            color: #0f0;
            font-family: monospace;
        }

        .error {
            color: #f55;
        }

        /* Jauge de vitesse */
        .speed-gauge {
            height: 6px;
            background: #333;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }

        .speed-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s linear;
        }

        /* Clavier virtuel */
        #keyboard {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
        }

        .key {
            background: #444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .key:hover {
            background: #555;
        }

        .key.validated {
            background: #0f0;
            color: black;
        }

        .key.invalid {
            background: #f55;
            color: white;
        }

        button {
            background: #4ecdc4;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            background: #45b7b8;
        }
    </style>
</head>
<body>
    <video id="video" autoplay muted></video>
    <div id="letterDisplay"></div>
    <div id="ui">
        <div class="stat">Vitesse: 0</div>
        <div class="stat">Distance: 0 cm</div>
        <div class="stat">État: IDLE</div>
        <div class="speed-gauge">
            <div id="speedBar" class="speed-bar"></div>
        </div>
        <button id="startBtn">DÉMARRER</button>
        <div id="waitingMessage" style="display: none; margin-top: 10px; text-align: center;">
            Validez la lettre affichée au centre
        </div>
    </div>
    <div id="keyboard"></div>

    <script>
        // Variables globales
        const video = document.getElementById('video');
        const letterEl = document.getElementById('letterDisplay');
        const startBtn = document.getElementById('startBtn');
        const waitingMessage = document.getElementById('waitingMessage');
        const keyboard = document.getElementById('keyboard');
        const uiStats = {
            speed: document.querySelectorAll('.stat')[0],
            distance: document.querySelectorAll('.stat')[1],
            state: document.querySelectorAll('.stat')[2]
        };
        const speedBar = document.getElementById('speedBar');

        // Variables de contrôle
        let state = 'IDLE'; // 'IDLE' ou 'WAITING_VALIDATION'
        let lastFlashTime = 0;
        let currentDisplayedLetter = '';
        let speed = 0;
        let distance = 0;
        let animationFrameId = null;
        let lastTime = 0;

        // Lettres à afficher
        const letters = ['E', 'F', 'H', 'K', 'N', 'O', 'R', 'S', 'T', 'U', 'V', 'Y'];

        // --- INITIALISATION DU CLAVIER ---
        function initKeyboard() {
            keyboard.innerHTML = '';
            const letters = ['E', 'F', 'H', 'K', 'N', 'O', 'R', 'S', 'T', 'U', 'V', 'Y'];

            letters.forEach(letter => {
                const key = document.createElement('button');
                key.className = 'key';
                key.textContent = letter;
                key.addEventListener('click', () => validateLetter(letter));
                keyboard.appendChild(key);
            });
        }

        // --- VALIDATION D'UNE LETTRE ---
        function validateLetter(letter) {
            if (state !== 'WAITING_VALIDATION') return;

            const keys = document.querySelectorAll('.key');
            keys.forEach(k => k.classList.remove('validated', 'invalid'));

            const clickedKey = Array.from(keys).find(k => k.textContent === letter);

            if (clickedKey) {
                if (letter === currentDisplayedLetter) {
                    clickedKey.classList.add('validated');
                    letterEl.style.opacity = '0';
                    state = 'IDLE';
                    waitingMessage.style.display = 'none';
                } else {
                    clickedKey.classList.add('invalid');
                }
            }
        }

        // --- MACHINE D'ÉTAT ---
        function handleState(currentSpeed, now) {
            const minSpeedTrigger = 150;
            const cooldownDuration = 1000;

            if (state === 'IDLE' && currentSpeed > minSpeedTrigger && (now - lastFlashTime > cooldownDuration)) {
                state = 'WAITING_VALIDATION';
                lastFlashTime = now;

                currentDisplayedLetter = letters[Math.floor(Math.random() * letters.length)];
                letterEl.innerText = currentDisplayedLetter;
                letterEl.style.opacity = '1';
                letterEl.style.fontSize = '100px';

                waitingMessage.style.display = 'block';
            }
        }

        // --- GESTION DE L'AFFICHAGE ---
        function updateDisplay(now) {
            // Faire disparaître la lettre après 60ms si non validée
            if (state === 'WAITING_VALIDATION' && now - lastFlashTime >= 60) {
                letterEl.style.opacity = '0';
                state = 'IDLE';
                waitingMessage.style.display = 'none';
            }
        }

        // --- BOUCLE PRINCIPALE ---
        function loop(currentTime) {
            if (!lastTime) lastTime = currentTime;
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // Calcul de la vitesse (simulation)
            speed = Math.sin(currentTime / 500) * 200 + 100;
            distance = speed * (deltaTime / 1000);

            // Mise à jour de l'UI
            uiStats.speed.textContent = `Vitesse: ${Math.round(speed)}`;
            uiStats.distance.textContent = `Distance: ~${Math.round(distance)} cm`;
            uiStats.state.textContent = `État: ${state}`;

            // Mise à jour de la jauge
            const pct = Math.min(100, (speed / 250) * 100);
            speedBar.style.width = `${pct}%`;

            if(speed > 150) {
                speedBar.style.background = '#f00';
            } else {
                speedBar.style.background = 'linear-gradient(90deg, #0f0, #ff0, #f00)';
            }

            // Gestion de l'état
            handleState(speed, currentTime);
            updateDisplay(currentTime);

            animationFrameId = requestAnimationFrame(loop);
        }

        // --- DÉMARRAGE ---
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                startBtn.style.display = 'none';

                // Initialisation
                initKeyboard();
                animationFrameId = requestAnimationFrame(loop);
            } catch (err) {
                console.error("Erreur accès caméra:", err);
                alert("Impossible d'accéder à la caméra");
            }
        });

        // Nettoyage
        window.addEventListener('beforeunload', () => {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
