<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Acuité Dynamique</title>
    <style>
        video {
            display: none;
        }
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px black;
            z-index: 1000;
            pointer-events: none;
        }
        #ui {
            max-width: 300px;
        }
        .error { color: #f55; }

        /* Jauge de vitesse */
        .speed-gauge {
        }
        .speed-bar {
            transition: width 0.1s linear;
        }
        button {
            background: #444;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #calibPanel {
        }
        .calib-bar-container {
        }

        /* Contrôle pour la taille des lettres */
        #letterSizeControl {
            width: 120px;
            text-align: center;
        }
        #letterSizeLabel {
            font-size: 11px; margin-bottom: 5px;
        }
        #letterSizeValue {
            color: #4ecdc4;
        }
        .size-control-buttons {
        }
        .size-btn {
            background: #444;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .size-btn:hover {
            background: #777;
        }
        #letterSizeInput {
            font-family: monospace;
        }

        /* Clavier virtuel */
        #keyboard {
            display: flex;
            flex-wrap: wrap;
            width: 90%; max-width: 550px;
        }
        .key {
            width: 40px; height: 40px; margin: 3px;
            background: #333; border: 1px solid #555;
            color: white; font-size: 18px;
            transition: all 0.2s;
        }
        .key:hover {
            background: #555;
            transform: scale(1.1);
        }
        .key.validated {
            background: #28a745;
        }
        .key.invalid {
            background: #dc3545;
            cursor: not-allowed;
        }
        #waitingMessage {
            position: fixed; bottom: 10px; left: 50%;
            transform: translateX(-50%);
            z-index: 31;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 4px;
            white-space: nowrap;
        }

        /* Écran de résultats final */
        #resultsScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #resultsScreen h2 {
            color: #4ecdc4;
            margin-bottom: 20px;
        }
        #resultsContent {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
        }
        #resultsContent p {
            margin: 10px 0;
            color: white;
        }
        #restartBtn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background: #4ecdc4;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="startOverlay">
        <h1>Test Acuité (Pro)</h1>
        <p>Détection de vitesse optimisée.</p>
        <button id="startBtn" onclick="startApp()">Commencer</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <div id="letterDisplay">A</div>

    <div id="ui" style="display:none;">
        <div class="speed-gauge">
            Vitesse: <span id="speedVal">0</span> px/s
            <div class="speed-bar-container">
                <div id="speedBar" class="speed-bar"></div>
            </div>
        </div>
        <hr style="border-color:#333; margin: 5px 0;">
        <div>
            Acuité: <span id="valAcuity">1.0</span>
        </div>

        <div id="calibPanel">
            <div class="calib-bar-container">
                <button onclick="toggleCalib()">Calibrer</button>
                <input type="range" id="calibRange" min="100" max="400" value="300" oninput="updateCalib()">
                <span id="calibVal">300</span>
            </div>
        </div>
    </div>

    <!-- Contrôle pour la taille des lettres -->
    <div id="letterSizeControl" style="display:none;">
        <div id="letterSizeValue">80</div>
        <div class="size-control-buttons">
            <button class="size-btn" onclick="adjustLetterSize(-5)">-</button>
            <input type="number" id="letterSizeInput" value="80" onchange="updateLetterSizeFromInput()">
            <button class="size-btn" onclick="adjustLetterSize(5)">+</button>
        </div>
    </div>

    <!-- Clavier virtuel -->
    <div id="keyboard" style="display:none;">
    </div>

    <!-- Message d'attente -->
    <div id="waitingMessage" style="display:none;">Cliquez sur la lettre</div>

    <!-- Écran de résultats final -->
    <div id="resultsScreen">
        <h2>Résultats du Test</h2>
        <div id="resultsContent">
            <p><strong>Taille minimale atteinte:</strong> <span id="resultMinSize">80</span> px</p>
            <p><strong>Acuité:</strong> <span id="resultAcuity">1.0</span></p>
            <p><strong>Essais:</strong> <span id="resultTotal">0</span></p>
            <p><strong>Bonnes réponses:</strong> <span id="resultCorrect">0</span></p>
            <p><strong>Taux de réussite:</strong> <span id="resultRate">0</span>%</p>
            <p><strong>Erreurs consécutives:</strong> <span id="resultErrors">0</span></p>
        </div>
        <button id="restartBtn" onclick="restartTest()">Recommencer</button>
    </div>

<script>
    let model = null;
    let video = document.getElementById('video');
    let ui = document.getElementById('ui');
    let overlay = document.getElementById('startOverlay');
    let letterEl = document.getElementById('letterDisplay');
    let keyboard = document.getElementById('keyboard');
    let letterSizeValueEl = document.getElementById('letterSizeValue');
    let letterSizeInputEl = document.getElementById('letterSizeInput');
    let waitingMessage = document.getElementById('waitingMessage');
    let resultsScreen = document.getElementById('resultsScreen');

    // Paramètres
    let acuity = 1.0;
    let screenDPI = 300;
    let calibrationFactor = 1.0;
    let letterSizePx = 80;

    // Tracking
    let lastHeadPos = null;
    let lastTime = 0;
    let speed = 0;
    let smoothedSpeed = 0;
    let distance = 50;
    let rawDistance = 50;
    let state = 'IDLE'; // IDLE, WAITING_VALIDATION
    let lastFlashTime = 0;
    let currentDisplayedLetter = null;
    let flashTimeout = null;

    // Compteur d'erreurs consécutives
    let consecutiveErrors = 0;
    const MAX_CONSECUTIVE_ERRORS = 3;

    // Statistiques
    let totalAttempts = 0;
    let correctAnswers = 0;

    // Liste des lettres (valeur fixe)
    const letters = ['A', 'C', 'D', 'E', 'F', 'H', 'K', 'M', 'N', 'O', 'P', 'R', 'T', 'U', 'V', 'X', 'Z'];

// --- INITIALISATION DU CLAVIER ---
function initKeyboard() {
    keyboard.innerHTML = '';
    const lettersSorted = [...letters].sort();

    lettersSorted.forEach(letter => {
        const key = document.createElement('button');
        key.className = 'key';
        key.textContent = letter;
        key.onclick = () => validateLetter(letter);
        keyboard.appendChild(key);
    });
}

// --- VALIDATION D'UNE LETTRE ---
function validateLetter(letter) {
    if (state !== 'WAITING_VALIDATION') return;

    // Effacer le timeout de disparition automatique
    if (flashTimeout) {
        clearTimeout(flashTimeout);
        flashTimeout = null;
    }

    const keys = document.querySelectorAll('.key');

    // Réinitialiser tous les styles
    keys.forEach(k => {
        k.classList.remove('validated', 'invalid');
    });

    // Trouver la touche cliquée
    const clickedKey = Array.from(keys).find(k => k.textContent === letter);

    if (clickedKey) {
        totalAttempts++;

        if (letter === currentDisplayedLetter) {
            // SUCCÈS
            clickedKey.classList.add('validated');
            correctAnswers++;
            consecutiveErrors = 0;
        } else {
            // ÉCHEC
            clickedKey.classList.add('invalid');
            consecutiveErrors++;

            // Agrandir la lettre de 5px en cas d'erreur
            letterSizePx += 5;
            letterEl.style.fontSize = letterSizePx + 'px';
            letterSizeValueEl.innerText = letterSizePx;
            letterSizeInputEl.value = letterSizePx;
            updateAcuityFromSize();

            // Vérifier si 3 erreurs consécutives
            if (consecutiveErrors >= MAX_CONSECUTIVE_ERRORS) {
                endTest();
                return;
            }
        }

        updateStats();

        // Faire disparaître immédiatement
        letterEl.style.opacity = '0';
        state = 'IDLE';
        waitingMessage.style.display = 'none';
    }
}

// --- FIN DU TEST ---
function endTest() {
    // Arrêter la boucle principale
    if (model) {
        model = null;
    }

    // Calculer les statistiques finales
    const rate = totalAttempts > 0 ? Math.round((correctAnswers / totalAttempts) * 100) : 0;

    // Mettre à jour l'écran de résultats
    document.getElementById('resultMinSize').innerText = letterSizePx;
    document.getElementById('resultAcuity').innerText = acuity.toFixed(2);
    document.getElementById('resultTotal').innerText = totalAttempts;
    document.getElementById('resultCorrect').innerText = correctAnswers;
    document.getElementById('resultRate').innerText = rate;
    document.getElementById('resultErrors').innerText = consecutiveErrors;

    // Afficher l'écran de résultats
    resultsScreen.style.display = 'flex';
}

// --- REDÉMARRAGE ---
function restartTest() {
    // Masquer l'écran de résultats
    resultsScreen.style.display = 'none';

    // Réinitialiser les variables
    consecutiveErrors = 0;
    totalAttempts = 0;
    correctAnswers = 0;
    letterSizePx = 80;
    acuity = 1.0;
    state = 'IDLE';

    // Réinitialiser l'affichage
    letterEl.style.fontSize = '80px';
    letterEl.style.opacity = '0';
    letterSizeValueEl.innerText = '80';
    letterSizeInputEl.value = '80';
    waitingMessage.style.display = 'none';

    // Réinitialiser le clavier
    document.querySelectorAll('.key').forEach(k => {
        k.classList.remove('validated', 'invalid');
    });

    updateStats();

    // Relancer la boucle principale
    loop();
}

function saveCalib() {
    updateStats();
}
function loadCalib() {
    if (saved) {
        calibrationFactor = parseFloat(saved);
        updateCalib();
    }
}

// --- GESTION DE LA TAILLE DES LETTRES ---
function updateLetterSizeFromInput() {
    const newSize = parseInt(letterSizeInputEl.value);
    if (!isNaN(newSize) && newSize >= 20 && newSize <= 500) {
        letterSizePx = newSize;
        updateAcuityFromSize();
        updateLetterDisplay();
        updateStats();
    }
    letterSizeInputEl.value = letterSizePx;
}

function adjustLetterSize(delta) {
    letterSizePx = Math.max(20, Math.min(500, letterSizePx + delta));
    letterSizeInputEl.value = letterSizePx;
    updateAcuityFromSize();
    updateLetterDisplay();
    updateStats();
}

function updateAcuityFromSize() {
    const heightCm = (distance * 0.0145) / acuity;
    const heightPx = (heightCm / 2.54) * screenDPI;
    letterSizePx = Math.max(20, Math.round(heightPx));
    acuity = Math.max(0.1, Math.min(2.0, acuity));
}

function updateLetterDisplay() {
    letterSizeValueEl.innerText = letterSizePx;
    letterEl.style.fontSize = letterSizePx + 'px';
}

// --- DÉMARRAGE ---
async function startApp() {
    loadCalib();
    initKeyboard();
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: 640, height: 480 }
        });
        video.srcObject = stream;
        video.onloadedmetadata = async () => {
            overlay.style.display = 'none';
            ui.style.display = 'block';
            letterSizeControl.style.display = 'block';
            keyboard.style.display = 'flex';
            video.play();
            model = await blazeface.load();

            updateLetterDisplay();
            loop();
        };
    } catch (err) {
        console.error(err);
    }
}

    if (!model) return;

    const predictions = await model.estimateFaces(video);

    if (predictions.length > 0) {
        const face = predictions[0];
        const nose = face.landmarks[2];
        const leftEye = face.landmarks[0];
        const rightEye = face.landmarks[1];

        // 1. DISTANCE
        const distInterYeuxPx = Math.sqrt(
            Math.pow(rightEye[0] - leftEye[0], 2) +
            Math.pow(rightEye[1] - leftEye[1], 2)

        }

        // 2. VITESSE
        const now = performance.now();
        if (lastHeadPos) {
            const dt = (now - lastTime);
            if (dt > 16) {
                const dx = nose[0] - lastHeadPos.x;
                const dy = nose[1] - lastHeadPos.y;
                let rawSpeed = distPx / dt;
                speed = smoothedSpeed * 1000;
            }
        }
        lastHeadPos = { x: nose[0], y: nose[1] };
        lastTime = now;

        handleState(speed, now);
        updateStats();

    } else {
        smoothedSpeed = smoothedSpeed * 0.9;
        speed = smoothedSpeed * 1000;
        updateStats();
    }
    requestAnimationFrame(loop);
}

// --- MACHINE D'ÉTAT MODIFIÉE ---
function handleState(currentSpeed, now) {
    const minSpeedTrigger = 150;
    const flashDuration = 60; // Valeur fixe à 60ms
    const cooldownDuration = 1000;

    if (state === 'IDLE') {
        if (now - lastFlashTime > cooldownDuration && currentSpeed < minSpeedTrigger) {
            state = 'WAITING_VALIDATION';
            lastFlashTime = now;

            if (letterChanged) {
                letterChanged = false;
            }

            // Choisir une lettre aléatoire
            const randomLetter = letters[Math.floor(Math.random() * letters.length)];
            currentDisplayedLetter = randomLetter;
            letterEl.textContent = randomLetter;

            letterEl.style.opacity = '1';

            waitingMessage.style.display = 'block';

            // Disparaît automatiquement après 60ms
            flashTimeout = setTimeout(() => {
                if (state === 'WAITING_VALIDATION') {
                    letterEl.style.opacity = '0';
                }
            }, flashDuration);
        }
    }
}

// --- CALCUL TAILLE OPTIQUE ---
function calculateSize(distCm, acuityDecimal) {
    let heightCm = (distCm * 0.0145) / acuityDecimal;
    let heightPx = (heightCm / 2.54) * screenDPI;
    return Math.max(20, Math.round(heightPx));
}

function updateParams() {
    updateLetterDisplay();
    letterSizeInputEl.value = letterSizePx;
}

function updateStats() {
    document.getElementById('speedVal').innerText = Math.round(speed);
    document.getElementById('valAcuity').innerText = acuity.toFixed(2);

    let pct = Math.min(100, (speed / 250) * 100);
    document.getElementById('speedBar').style.width = pct + '%';

    const bar = document.getElementById('speedBar');
    if(speed > 150) bar.style.background = '#f00';
    else bar.style.background = '#4ecdc4';
}
</script>
