<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acuité Dynamique - Test avec Scoring et Arrêt Automatique</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
            touch-action: manipulation;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }

        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 15px black, 0 0 15px black;
            transition: opacity 0.3s ease;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 10px;
            max-width: 320px;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
        }

        .stat {
            font-size: 14px;
            margin: 8px 0;
            color: #0ff;
            font-family: 'Courier New', monospace;
        }

        .error {
            color: #ff5555;
        }

        .speed-gauge {
            height: 8px;
            background: #333;
            margin-top: 10px;
            border-radius: 4px;
            overflow: hidden;
        }

        .speed-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s linear;
        }

        button {
            background: #4ecdc4;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            font-size: 16px;
            transition: background 0.2s;
        }

        button:hover {
            background: #45b7b8;
        }

        button:active {
            transform: scale(0.98);
        }

        #keyboard {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            max-width: 80%;
        }

        .key {
            width: 50px;
            height: 50px;
            background: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .key:hover {
            background: #555;
            transform: scale(1.05);
        }

        .key.validated {
            background: #4CAF50;
            color: white;
        }

        .key.invalid {
            background: #f44336;
            color: white;
        }

        #waitingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #0ff;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 12;
            display: none;
        }

        #resultsScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #resultsContent {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 500px;
            border: 2px solid #4ecdc4;
        }

        #resultsTitle {
            color: #4ecdc4;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .result-item {
            margin: 15px 0;
            font-size: 18px;
        }

        .result-value {
            color: #0ff;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        #letterSizeInput {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px;
            border-radius: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="letterDisplay">A</div>
    <div id="ui">
        <div class="stat">Essais: <span id="statusTrials">0</span></div>
        <div class="stat">Bonnes réponses: <span id="statusCorrect">0</span></div>
        <div class="stat">Taux: <span id="statusAccuracy">0%</span></div>
        <div class="stat">Taille: <span id="statusSize">80</span> px</div>
        <div class="stat error">Erreurs consécutives: <span id="statusConsecutiveErrors">0</span>/3</div>
        <div class="speed-gauge">
            <div class="speed-bar" id="speedBar"></div>
        </div>
        <div style="margin-top: 10px; font-size: 12px; color: #aaa;">Vitesse: <span id="statusSpeed">0</span> px/s</div>
    </div>

    <input type="number" id="letterSizeInput" value="80" min="20" max="300">

    <div id="waitingMessage">Regardez la lettre...</div>

    <div id="keyboard">
        <div class="key">A</div>
        <div class="key">B</div>
        <div class="key">C</div>
        <div class="key">D</div>
        <div class="key">E</div>
        <div class="key">F</div>
        <div class="key">G</div>
        <div class="key">H</div>
        <div class="key">I</div>
        <div class="key">J</div>
        <div class="key">K</div>
        <div class="key">L</div>
    </div>

    <div id="resultsScreen">
        <div id="resultsContent">
            <h2 id="resultsTitle">Test terminé</h2>
            <div class="result-item">
                Essais: <span class="result-value" id="finalTrials">0</span>
            </div>
            <div class="result-item">
                Bonnes réponses: <span class="result-value" id="finalCorrect">0</span>
            </div>
            <div class="result-item">
                Taux de réussite: <span class="result-value" id="finalAccuracy">0%</span>
            </div>
            <div class="result-item">
                Taille minimale: <span class="result-value" id="finalMinSize">80</span> px
            </div>
            <div class="result-item">
                Erreurs consécutives: <span class="result-value" id="finalConsecutiveErrors">0</span>/3
            </div>
            <button id="restartButton">Recommencer le test</button>
        </div>
    </div>

    <script>
        // ========== VARIABLES GLOBALES ==========
        let state = 'IDLE'; // IDLE, WAITING_VALIDATION, ENDED
        let flashTimeout = null;
        let letterChanged = false;
        let totalTrials = 0;
        let correctAnswers = 0;
        let consecutiveErrors = 0;
        let letterSizePx = 80;
        let speed = 0;
        let lastUpdateTime = Date.now();
        let lastSizeChangeTime = Date.now();
        let distance = 50; // Distance approximative en cm

        // ========== ÉLÉMENTS DOM ==========
        const videoEl = document.getElementById('video');
        const letterEl = document.getElementById('letterDisplay');
        const keyboardEl = document.getElementById('keyboard');
        const waitingMessage = document.getElementById('waitingMessage');
        const resultsScreen = document.getElementById('resultsScreen');
        const restartButton = document.getElementById('restartButton');

        // Stats UI
        const trialsEl = document.getElementById('statusTrials');
        const correctEl = document.getElementById('statusCorrect');
        const accuracyEl = document.getElementById('statusAccuracy');
        const sizeEl = document.getElementById('statusSize');
        const consecutiveErrorsEl = document.getElementById('statusConsecutiveErrors');
        const speedEl = document.getElementById('statusSpeed');
        const speedBarEl = document.getElementById('speedBar');

        // Final results
        const finalTrialsEl = document.getElementById('finalTrials');
        const finalCorrectEl = document.getElementById('finalCorrect');
        const finalAccuracyEl = document.getElementById('finalAccuracy');
        const finalMinSizeEl = document.getElementById('finalMinSize');
        const finalConsecutiveErrorsEl = document.getElementById('finalConsecutiveErrors');

        // Letter size input
        const letterSizeInputEl = document.getElementById('letterSizeInput');
        letterSizeInputEl.addEventListener('change', function() {
            letterSizePx = parseInt(this.value) || 80;
            sizeEl.textContent = letterSizePx;
            updateLetterDisplay();
        });

        // ========== LETTRES DISPONIBLES ==========
        const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];

        // ========== INITIALISATION ==========
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                videoEl.srcObject = stream;
                startTest();
            } catch (err) {
                console.error('Erreur accès caméra:', err);
                alert('Impossible d\'accéder à la caméra. Veuillez autoriser l\'accès.');
            }
        }

        // ========== LANCEMENT DU TEST ==========
        function startTest() {
            resetTest();
            showRandomLetter();
            state = 'IDLE';
        }

        // ========== RÉINITIALISATION ==========
        function resetTest() {
            totalTrials = 0;
            correctAnswers = 0;
            consecutiveErrors = 0;
            letterSizePx = 80;
            state = 'IDLE';

            trialsEl.textContent = totalTrials;
            correctEl.textContent = correctAnswers;
            accuracyEl.textContent = '0%';
            sizeEl.textContent = letterSizePx;
            consecutiveErrorsEl.textContent = consecutiveErrors;
            speedEl.textContent = '0';
            speedBarEl.style.width = '0%';

            letterEl.style.opacity = '0';
            waitingMessage.style.display = 'none';
            resultsScreen.style.display = 'none';

            if (flashTimeout) {
                clearTimeout(flashTimeout);
                flashTimeout = null;
            }
        }

        // ========== AFFICHAGE D'UNE LETTRE ==========
        function showRandomLetter() {
            if (state === 'ENDED') return;

            const randomLetter = letters[Math.floor(Math.random() * letters.length)];
            letterEl.textContent = randomLetter;

            // Calcule la taille en fonction de la distance (simplifié)
            letterSizePx = Math.max(20, Math.min(300, letterSizePx));
            updateLetterDisplay();

            letterEl.style.opacity = '1';
            state = 'WAITING_VALIDATION';
            waitingMessage.style.display = 'block';

            // Cache la lettre après 2 secondes
            flashTimeout = setTimeout(() => {
                letterEl.style.opacity = '0';
                waitingMessage.style.display = 'none';
                state = 'IDLE';
                letterChanged = true;
            }, 2000);
        }

        // ========== MISE À JOUR DE L'AFFICHAGE DE LA LETTRE ==========
        function updateLetterDisplay() {
            letterEl.style.fontSize = `${letterSizePx}px`;
            sizeEl.textContent = letterSizePx;
            letterSizeInputEl.value = letterSizePx;
        }

        // ========== VALIDATION DE LA RÉPONSE ==========
        function validateLetter(letter) {
            if (state !== 'WAITING_VALIDATION') return;

            if (flashTimeout) {
                clearTimeout(flashTimeout);
                flashTimeout = null;
            }

            // Réinitialise les styles des touches
            const keys = document.querySelectorAll('.key');
            keys.forEach(k => k.classList.remove('validated', 'invalid'));

            const clickedKey = Array.from(keys).find(k => k.textContent === letter);

            if (clickedKey) {
                totalTrials++;
                trialsEl.textContent = totalTrials;

                if (letter === letterEl.textContent) {
                    correctAnswers++;
                    correctEl.textContent = correctAnswers;
                    consecutiveErrors = 0; // Réinitialise les erreurs consécutives
                    clickedKey.classList.add('validated');

                    // Réduit la taille de 5px si bonne réponse
                    letterSizePx = Math.max(20, letterSizePx - 5);
                } else {
                    consecutiveErrors++;
                    consecutiveErrorsEl.textContent = consecutiveErrors;
                    clickedKey.classList.add('invalid');

                    // Augmente la taille de 5px si mauvaise réponse
                    letterSizePx = Math.min(300, letterSizePx + 5);
                }

                // ===== ARRÊT AUTOMATIQUE SI 3 ERREURS CONSÉCUTIVES =====
                if (consecutiveErrors >= 3) {
                    endTest();
                    return;
                }

                updateLetterDisplay();
                updateStats();

                letterEl.style.opacity = '0';
                waitingMessage.style.display = 'none';
                state = 'IDLE';
                letterChanged = true;

                // Affiche une nouvelle lettre après un court délai
                setTimeout(showRandomLetter, 500);
            }
        }

        // ========== MISE À JOUR DES STATISTIQUES ==========
        function updateStats() {
            // Calcul de la vitesse (simplifié)
            const now = Date.now();
            const timeDiff = now - lastUpdateTime;
            if (timeDiff > 0) {
                speed = (letterSizePx - 80) / (timeDiff / 1000);
                speed = Math.abs(speed);
            }
            lastUpdateTime = now;

            speedEl.textContent = Math.round(speed);
            const pct = Math.min(100, (speed / 250) * 100);
            speedBarEl.style.width = `${pct}%`;

            // Changement de couleur de la barre de vitesse
            if (speed > 150) {
                speedBarEl.style.background = '#f00';
            } else if (speed > 100) {
                speedBarEl.style.background = '#ff0';
            } else {
                speedBarEl.style.background = 'linear-gradient(90deg, #0f0, #ff0, #f00)';
            }

            // Calcul du taux de réussite
            const accuracy = totalTrials > 0 ? Math.round((correctAnswers / totalTrials) * 100) : 0;
            accuracyEl.textContent = `${accuracy}%`;
        }

        // ========== FIN DU TEST ==========
        function endTest() {
            state = 'ENDED';

            // Arrête tous les timeouts
            if (flashTimeout) {
                clearTimeout(flashTimeout);
            }

            // Affiche les résultats
            const accuracy = totalTrials > 0
                ? Math.round((correctAnswers / totalTrials) * 100)
                : 0;

            finalTrialsEl.textContent = totalTrials;
            finalCorrectEl.textContent = correctAnswers;
            finalAccuracyEl.textContent = `${accuracy}%`;
            finalMinSizeEl.textContent = Math.min(80, letterSizePx);
            finalConsecutiveErrorsEl.textContent = consecutiveErrors;

            resultsScreen.style.display = 'flex';
        }

        // ========== GESTION DU CLAVIER ==========
        keyboardEl.addEventListener('click', function(e) {
            if (e.target.classList.contains('key')) {
                validateLetter(e.target.textContent);
            }
        });

        // ========== GESTION DU CLAVIER PHYSIQUE ==========
        document.addEventListener('keydown', function(e) {
            if (state === 'WAITING_VALIDATION' && letters.includes(e.key.toUpperCase())) {
                validateLetter(e.key.toUpperCase());
            }
        });

        // ========== GESTION DU BOUTON RECOMMENCER ==========
        restartButton.addEventListener('click', function() {
            resultsScreen.style.display = 'none';
            startTest();
        });

        // ========== DÉMARRAGE ==========
        init();
    </script>
</body>
</html>
